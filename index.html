<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Granja Villa Myriam · Crianza</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐣</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* ============================================================
           ESTILOS MODERNOS Y PROFESIONALES
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f6f4f0;
            color: #1e1a16;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* ---------- AUTH ---------- */
        #authPage {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1f1105 0%, #3b2010 50%, #5c331a 100%);
            padding: 1.5rem;
        }

        .auth-card {
            background: #fffcf7;
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-brand .logo-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .auth-brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2b1a0c;
            letter-spacing: -0.02em;
        }

        .auth-brand p {
            font-size: 0.9rem;
            color: #7a6a5a;
            margin-top: 0.1rem;
        }

        .auth-tabs {
            display: flex;
            gap: 0.25rem;
            background: #f0ebe4;
            border-radius: 2.5rem;
            padding: 0.25rem;
            margin-bottom: 1.75rem;
        }

        .auth-tab {
            flex: 1;
            border: none;
            background: none;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #7a6a5a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: #fff;
            color: #2b1a0c;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .auth-tab:hover:not(.active) {
            color: #2b1a0c;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #8a7a6a;
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid #e6ddd4;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            background: #fff;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #b8712a;
            box-shadow: 0 0 0 3px rgba(184, 113, 42, 0.12);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 1.6rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            width: 100%;
        }

        .btn-primary {
            background: #b8712a;
            color: #fff;
        }

        .btn-primary:hover {
            background: #a05f22;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(184, 113, 42, 0.3);
        }

        .btn-secondary {
            background: #e6ddd4;
            color: #2b1a0c;
        }

        .btn-secondary:hover {
            background: #d5cabc;
        }

        .btn-success {
            background: #3b6b3b;
            color: #fff;
        }

        .btn-success:hover {
            background: #2f562f;
        }

        .btn-danger {
            background: #9b2a1a;
            color: #fff;
        }

        .btn-danger:hover {
            background: #7f1f11;
        }

        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            width: auto;
        }

        .btn-block {
            width: 100%;
        }

        .alert {
            padding: 0.7rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .alert-error {
            background: #fce8e4;
            color: #9b2a1a;
            border: 1px solid #f5c6c1;
        }

        .alert-success {
            background: #e6f4e6;
            color: #2f562f;
            border: 1px solid #b7dbb7;
        }

        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }
        .mt-1 {
            margin-top: 0.5rem;
        }
        .mt-2 {
            margin-top: 1rem;
        }
        .mb-1 {
            margin-bottom: 0.5rem;
        }
        .mb-2 {
            margin-bottom: 1rem;
        }
        .gap-1 {
            gap: 0.5rem;
        }
        .flex {
            display: flex;
        }
        .flex-wrap {
            flex-wrap: wrap;
        }
        .items-center {
            align-items: center;
        }
        .justify-between {
            justify-content: space-between;
        }

        .link-forgot {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: #b8712a;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .link-forgot:hover {
            text-decoration: underline;
        }

        /* ---------- ADMIN LAYOUT ---------- */
        #adminPage {
            display: none;
            min-height: 100vh;
            background: #f6f4f0;
        }

        #adminPage.active {
            display: flex;
            flex-direction: column;
        }

        /* TOPBAR */
        .topbar {
            background: #fffcf7;
            border-bottom: 1px solid #e6ddd4;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .topbar-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f0ebe4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            overflow: hidden;
        }

        .topbar-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .topbar-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #2b1a0c;
        }

        .topbar-sub {
            font-size: 0.75rem;
            color: #8a7a6a;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .badge-admin {
            background: #e8e0ff;
            color: #4a2b7a;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid #c5b8ee;
        }

        /* TABS */
        .tab-nav {
            background: #fffcf7;
            border-bottom: 1px solid #e6ddd4;
            overflow-x: auto;
            padding: 0 1.5rem;
            display: flex;
            gap: 0.25rem;
            scrollbar-width: none;
        }

        .tab-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            border: none;
            background: none;
            padding: 0.7rem 1.2rem;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            color: #8a7a6a;
            cursor: pointer;
            border-bottom: 2.5px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            color: #2b1a0c;
            border-bottom-color: #b8712a;
        }

        .tab-btn:hover:not(.active) {
            color: #2b1a0c;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 1.5rem;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* CARDS */
        .card {
            background: #fffcf7;
            border-radius: 1.25rem;
            border: 1px solid #e6ddd4;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px dashed #e6ddd4;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #2b1a0c;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title i {
            color: #b8712a;
            width: 1.25rem;
        }

        /* GRIDS */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem;
        }

        /* STATS */
        .stat-card {
            background: #faf7f2;
            border-radius: 1rem;
            padding: 1.25rem;
            text-align: center;
            border: 1px solid #e6ddd4;
        }

        .stat-card .icon {
            font-size: 1.75rem;
            color: #b8712a;
            margin-bottom: 0.3rem;
        }

        .stat-card .value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2b1a0c;
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: #8a7a6a;
            margin-top: 0.1rem;
        }

        /* TABLES */
        .table-wrap {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .table th {
            text-align: left;
            padding: 0.6rem 0.7rem;
            background: #f0ebe4;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #5a4a3a;
            white-space: nowrap;
        }

        .table td {
            padding: 0.6rem 0.7rem;
            border-bottom: 1px solid #e6ddd4;
            vertical-align: middle;
        }

        .table tr:last-child td {
            border-bottom: none;
        }

        .table tr:hover td {
            background: #faf7f2;
        }

        .table input,
        .table select {
            padding: 0.3rem 0.5rem;
            border: 1.5px solid #e6ddd4;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.85rem;
            background: #fff;
            width: 100%;
        }

        .table input:focus,
        .table select:focus {
            outline: none;
            border-color: #b8712a;
        }

        /* BADGES */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            padding: 0.15rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-active {
            background: #e6f4e6;
            color: #2f562f;
        }

        .badge-inactive {
            background: #fce8e4;
            color: #9b2a1a;
        }

        .badge-amber {
            background: #fef3e0;
            color: #b8712a;
        }

        .badge-blue {
            background: #e3edf5;
            color: #2c7da0;
        }

        .badge-purple {
            background: #e8e0ff;
            color: #4a2b7a;
        }

        /* ORDER CARDS */
        .order-card {
            background: #faf7f2;
            border-radius: 0.75rem;
            padding: 0.8rem 1rem;
            margin-bottom: 0.6rem;
            border-left: 4px solid #b8712a;
        }

        .order-card.green {
            border-left-color: #3b6b3b;
        }
        .order-card.red {
            border-left-color: #9b2a1a;
        }
        .order-card.blue {
            border-left-color: #2c7da0;
        }

        .order-card .meta {
            font-size: 0.8rem;
            color: #8a7a6a;
            margin-top: 0.2rem;
        }

        /* KPI BAR */
        .kpi-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #faf7f2;
            border-radius: 0.75rem;
            padding: 0.6rem 1rem;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .kpi-bar strong {
            color: #b8712a;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 1.5rem;
        }

        .modal-box {
            background: #fffcf7;
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 520px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-title {
            font-weight: 700;
            font-size: 1.2rem;
            color: #2b1a0c;
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e6ddd4;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        /* FOOTER */
        .app-footer {
            background: #fffcf7;
            border-top: 1px solid #e6ddd4;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: #8a7a6a;
        }

        .app-footer .footer-links {
            display: flex;
            gap: 0.75rem;
        }

        .app-footer .footer-links button {
            background: none;
            border: none;
            font-family: inherit;
            font-size: 0.8rem;
            color: #8a7a6a;
            cursor: pointer;
            transition: color 0.2s;
        }

        .app-footer .footer-links button:hover {
            color: #2b1a0c;
        }

        /* LOADER */
        .loader {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: #8a7a6a;
            gap: 0.75rem;
        }

        .loader::after {
            content: '';
            width: 28px;
            height: 28px;
            border: 3px solid #e6ddd4;
            border-top-color: #b8712a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* CHART WRAPPER */
        .chart-wrap {
            position: relative;
            width: 100%;
            height: 220px;
        }

        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #8a7a6a;
            font-style: italic;
        }

        .empty-state i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
            color: #d5cabc;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .grid-2,
            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr;
            }

            .auth-card {
                padding: 1.75rem 1.25rem;
            }

            .topbar {
                padding: 0.6rem 1rem;
            }

            .main {
                padding: 1rem;
            }

            .tab-nav {
                padding: 0 1rem;
            }

            .tab-btn {
                padding: 0.6rem 0.9rem;
                font-size: 0.8rem;
            }
        }

        /* FORM ROW */
        .form-row {
            display: grid;
            gap: 0.85rem;
            margin-bottom: 0.85rem;
        }

        .form-row.c2 {
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 480px) {
            .form-row.c2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    AUTH PAGE
    ============================================================ -->
    <div id="authPage">
        <div class="auth-card">
            <div class="auth-brand">
                <span class="logo-icon">🐣</span>
                <h1>Granja Villa Myriam</h1>
                <p>Sistema de Gestión de Crianza</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin">Iniciar sesión</button>
                <button class="auth-tab" id="tabRegister">Registrarse</button>
            </div>

            <!-- LOGIN -->
            <div id="loginPanel">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="loginEmail" placeholder="admin@finca.com" />
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPass" placeholder="••••••••" />
                </div>
                <div id="loginErr"></div>
                <button class="btn btn-primary btn-block" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Ingresar
                </button>
                <span class="link-forgot" id="forgotLink">¿Olvidaste tu contraseña?</span>
            </div>

            <!-- REGISTER -->
            <div id="registerPanel" class="hidden">
                <div class="form-row c2">
                    <div class="form-group">
                        <label>Nombre completo *</label>
                        <input type="text" id="regNombre" placeholder="Juan Pérez" />
                    </div>
                    <div class="form-group">
                        <label>Cédula / Documento *</label>
                        <input type="text" id="regDocumento" placeholder="123456789" />
                    </div>
                </div>
                <div class="form-row c2">
                    <div class="form-group">
                        <label>Edad</label>
                        <input type="number" id="regEdad" placeholder="30" min="18" max="99" />
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico *</label>
                        <input type="email" id="regEmail" placeholder="admin@finca.com" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Contraseña * (mín. 6 caracteres)</label>
                    <input type="password" id="regPassword" placeholder="••••••••" />
                </div>
                <div id="registerErr"></div>
                <button class="btn btn-primary btn-block" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Crear cuenta
                </button>
                <p style="font-size:0.8rem;margin-top:0.75rem;color:#8a7a6a;text-align:center;">
                    Solo personal autorizado puede registrarse
                </p>
            </div>
        </div>
    </div>

    <!-- ============================================================
    ADMIN PAGE
    ============================================================ -->
    <div id="adminPage">
        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-brand">
                <div class="topbar-logo" id="adminTopLogo">🐣</div>
                <div>
                    <div class="topbar-title">Granja Villa Myriam</div>
                    <div class="topbar-sub">Panel de Producción</div>
                </div>
            </div>
            <div class="topbar-actions">
                <span class="badge-admin"><i class="fas fa-shield-alt"></i> Admin</span>
                <span id="adminWelcome" style="font-style:italic;font-size:0.9rem;"></span>
                <button class="btn btn-secondary btn-sm" id="adminLogout">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </header>

        <!-- TABS -->
        <nav class="tab-nav" id="adminTabNav"></nav>

        <!-- MAIN -->
        <main class="main" id="adminMain"></main>

        <!-- FOOTER -->
        <footer class="app-footer" id="footerAdmin"></footer>
    </div>

    <!-- ============================================================
    MODALES
    ============================================================ -->
    <div id="supportModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-title"><i class="fas fa-headset" style="color:#b8712a;"></i> Soporte</div>
            <p style="line-height:1.8;">
                <i class="fab fa-whatsapp" style="color:#3b6b3b;"></i>
                <strong>WhatsApp:</strong>
                <a href="https://wa.me/573054126770" target="_blank">305 412 6770</a><br />
                <i class="fas fa-phone" style="color:#b8712a;"></i>
                <strong>Teléfono:</strong> 305 868 60 94<br />
                <i class="fas fa-envelope" style="color:#2c7da0;"></i>
                <strong>Email:</strong> soporte@granjavilla.com
            </p>
            <div class="modal-actions">
                <button class="btn btn-secondary btn-block" id="closeSupportBtn">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="forgotModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-title">Recuperar contraseña</div>
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" id="resetEmail" placeholder="admin@finca.com" />
            </div>
            <div id="resetMsg"></div>
            <div class="modal-actions">

                const yy = dt.getFullYear();
                const hh = String(dt.getHours()).padStart(2, '0');
                const mi = String(dt.getMinutes()).padStart(2, '0');
                return dd + ' ' + mo + ' ' + yy + ', ' + hh + ':' + mi;

        const fmtDateShort = (d) => {

        async function dbLogin(email, pass) {

        async function dbRegister(email, pass, ud) {
            const { data, error } = await _sb.auth.signUp({
                email,
                password: pass,
                options: { data: { nombre: ud.nombre } }
            });
            if (error) {
                if (error.status === 429) throw new Error('RATE_LIMIT');
                throw error;
            }
            if (!data.user) throw new Error('No se pudo crear el usuario.');

            // Esperar a que el trigger cree el perfil
            const user_id = data.user.id;
            let perfilCreado = false;
            for (let i = 0; i < 10; i++) {
                await new Promise(r => setTimeout(r, 500));
                const { data: perfil, error: perfilError } = await _sb
                    .from('usuarios')
                    .select('*')
                    .eq('user_id', user_id)
                    .single();
                if (!perfilError && perfil) {
                    perfilCreado = true;
                    break;
                }
            }

            if (!perfilCreado) {
                const { error: insertError } = await _sb
                    .from('usuarios')
                    .insert({
                        user_id,
                        nombre: ud.nombre,
                        documento: ud.documento,
                        edad: ud.edad,
                        email,
                        es_admin: false
                    });
                if (insertError) throw new Error('Error al crear perfil: ' + insertError.message);
            } else {
                await _sb.from('usuarios')
                    .update({ documento: ud.documento, edad: ud.edad })
                    .eq('user_id', user_id);
            }
            return data.user;
        }

        async function renderTab(tab, cont) {

                if (tab === 'dashboard') await renderDashboard(cont);
                else if (tab === 'lotes') await renderLotes(cont);
                else if (tab === 'produccion') await renderProduccion(cont);
                else if (tab === 'alimentacion') await renderAlimentacion(cont);
                else if (tab === 'sanidad') await renderSanidad(cont);
                else if (tab === 'costos') await renderCostos(cont);
                else if (tab === 'inventario') await renderInventario(cont);
                else if (tab === 'reportes') await renderReportes(cont);
            } catch (e) {
                cont.innerHTML =
                    `<div class="alert alert-error"><i class="fas fa-circle-exclamation"></i> Error: ${escHtml(e.message)}</div>`;
                console.error('renderTab error:', e);
            }
        }

        // ---------- DASHBOARD ----------
        async function renderDashboard(cont) {
            cont.innerHTML = '<div class="loader">Cargando</div>';
            const lotes = await dbAllLotes();
            const lotesActivos = lotes.filter(l => l.estado === 'activo');
            const hoy = todayISO();
            let totalHuevosHoy = 0,
                totalAves = 0,
                totalMuertes = 0;
            let todasProducciones = [];

            for (const l of lotesActivos) {
                totalAves += l.cantidad_inicial;
                const prods = await dbProduccionesByLote(l.id);
                todasProducciones = todasProducciones.concat(prods);
                const hoyProd = prods.filter(p => p.fecha === hoy);
                totalHuevosHoy += hoyProd.reduce((s, p) => s + p.cantidad_huevos, 0);
                const san = await dbSanitariosByLote(l.id);
                totalMuertes += san.filter(s => s.tipo === 'muerte').reduce((s, e) => s + (e.cantidad || 0), 0);
            }

            const pctPostura = totalAves > 0 ? ((totalHuevosHoy / totalAves) * 100).toFixed(1) : '0.0';
            const mortalidad = totalAves > 0 ? ((totalMuertes / totalAves) * 100).toFixed(2) : '0.00';

            cont.innerHTML = `
                <div class="grid-4">
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-layer-group"></i></div>
                        <div class="value">${lotesActivos.length}</div>
                        <div class="label">Lotes activos</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-dove"></i></div>
                        <div class="value">${totalAves}</div>
                        <div class="label">Aves en producción</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-egg"></i></div>
                        <div class="value">${totalHuevosHoy}</div>
                        <div class="label">Huevos hoy</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-percent"></i></div>
                        <div class="value">${pctPostura}%</div>
                        <div class="label">% Postura hoy</div>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="card">
                        <div class="card-header"><div class="card-title"><i class="fas fa-list"></i> Lotes activos</div></div>
                        <div id="dashLotesList"></div>
                    </div>
                    <div class="card">
                        <div class="card-header"><div class="card-title"><i class="fas fa-bar-chart"></i> Mortalidad: <span style="color:#9b2a1a;">${mortalidad}%</span></div></div>
                        <div class="kpi-bar"><i class="fas fa-skull" style="color:#9b2a1a;"></i> <span>Muertes acumuladas: <strong>${totalMuertes}</strong> aves</span></div>
                        <div id="dashExtraStats"></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-chart-line"></i> Producción últimos 7 días</div></div>
                    <div class="chart-wrap"><canvas id="dashChart"></canvas></div>
                </div>
            `;

            // Lotes activos
            const listEl = $('dashLotesList');
            if (!lotesActivos.length) {
                listEl.innerHTML = '<div class="empty-state"><i class="fas fa-layer-group"></i>No hay lotes activos</div>';
            } else {
                listEl.innerHTML = lotesActivos.map(l => {
                    const prods = todasProducciones.filter(p => p.lote_id === l.id);
                    const totalP = prods.reduce((s, p) => s + p.cantidad_huevos, 0);
                    const avg = prods.length ? (totalP / prods.length).toFixed(0) : 0;
                    const dias = Math.floor((new Date() - new Date(l.fecha_ingreso)) / (1000 * 60 * 60 * 24));
                    return `<div class="order-card">
                        <div><strong>${escHtml(l.nombre)}</strong> <span class="badge badge-active">${l.estado}</span></div>
                        <div style="font-size:0.85rem;color:#8a7a6a;">${l.cantidad_inicial} aves · ${dias} días · Prom ${avg} hv/día</div>
                    </div>`;
                }).join('');
            }

            // Extra stats
            const treintaDias = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
            let totalProduccion30 = 0;
            todasProducciones.forEach(p => {
                if (new Date(p.fecha) >= treintaDias) totalProduccion30 += p.cantidad_huevos;
            });
            $('dashExtraStats').innerHTML = `
                <div class="kpi-bar"><i class="fas fa-egg" style="color:#b8712a;"></i> <span>Producción últimos 30 días: <strong>${totalProduccion30}</strong> huevos</span></div>
                <div class="kpi-bar"><i class="fas fa-boxes-stacked" style="color:#2c7da0;"></i> <span>Total lotes: <strong>${lotes.length}</strong></span></div>
            `;

            // Chart
            requestAnimationFrame(() => {
                const canvas = $('dashChart');
                if (!canvas) return;
                destroyChart('dash');
                const fechas = lastNDays(7);
                const data = fechas.map(f => {
                    return todasProducciones.filter(p => p.fecha === f).reduce((s, p) => s + p
                    .cantidad_huevos, 0);
                });

        async function renderLotes(cont) {

                if (!nombre) { alert('El nombre no puede estar vacío'); return; }
                await dbUpdateLote(id, { nombre, estado });
                await renderTab('lotes', cont);
            };

            window.eliminarLote = async (id) => {
                if (!confirm('¿Eliminar este lote? Se perderán todos los datos asociados.')) return;
                await dbDeleteLote(id);
                await renderTab('lotes', cont);
            };

            const rows = lotes.map(l => `

                    <td><span class="badge badge-amber">${escAttr(l.codigo)}</span></td>
                    <td>${fmtDateShort(l.fecha_ingreso)}</td>
                    <td>${l.cantidad_inicial}</td>
                    <td>
                        <select id="lest_${l.id}">
                            <option value="activo" ${l.estado === 'activo' ? 'selected' : ''}>activo</option>
                            <option value="inactivo" ${l.estado === 'inactivo' ? 'selected' : ''}>inactivo</option>

                    <div id="loteMsg"></div>

                <div class="card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-list"></i> Lotes registrados <small style="font-weight:400;color:#8a7a6a;">${lotes.length} total</small></div></div>

        // ---------- PRODUCCIÓN ----------

                const clasificacion = $('prodClasif').value;
                if (!lote_id || !fecha || isNaN(cantidad) || cantidad < 0) {
                    showMsg('prodMsg', 'Todos los campos son obligatorios', 'error');
                    return;
                }
                try {
                    await dbCreateProduccion({ lote_id: parseInt(lote_id), fecha, cantidad_huevos: cantidad,

                    <div class="order-card">
                        <div><strong>${p.cantidad_huevos}</strong> huevos · <span class="badge badge-amber">${escHtml(p.clasificacion || 'sin clasif')}</span></div>

                    </div>
                `).join('');
            }

            // Resumen hoy
            const hoy = todayISO();
            const resEl = $('prodResumen');
            let resHtml = '';
            lotesActivos.forEach(l => {
                const p = allProds.filter(pp => pp.lote_id === l.id && pp.fecha === hoy);
                const total = p.reduce((s, pp) => s + pp.cantidad_huevos, 0);
                const pct = l.cantidad_inicial > 0 ? ((total / l.cantidad_inicial) * 100).toFixed(1) : '0.0';
                resHtml += `<div class="kpi-bar"><i class="fas fa-egg" style="color:#b8712a;"></i> <span>${escHtml(l.nombre)}: <strong>${total}</strong> huevos (${pct}% postura)</span></div>`;

                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'top' } },
                        scales: { y: { beginAtZero: true } }

                });

                    <div class="card-header"><div class="card-title"><i class="fas fa-plus-circle"></i> Registrar costo</div></div>
                    <div class="form-row c2">
                        <div class="form-group"><label>Lote</label><select id="cosLote">${options}</select></div>
                        <div class="form-group"><label>Fecha</label><input type="date" id="cosFecha" value="${todayISO()}" /></div>
                    </div>
                    <div class="form-row c2">
                        <div class="form-group"><label>Concepto</label><input id="cosConcepto" placeholder="Ej: Alimento" /></div>
                        <div class="form-group"><label>Monto ($)</label><input type="number" id="cosMonto" step="100" min="0" value="0" /></div>
                    </div>
                    <button class="btn btn-primary" id="btnRegCosto"><i class="fas fa-save"></i> Registrar costo</button>
                    <div id="cosMsg"></div>
                </div>
                <div class="grid-2">
                    <div class="card">
                        <div class="card-header"><div class="card-title"><i class="fas fa-list"></i> Últimos costos</div></div>
                        <div id="cosList"></div>
                    </div>
                    <div class="card">
                        <div class="card-header"><div class="card-title"><i class="fas fa-calculator"></i> Costo por huevo</div></div>
                        <div id="costoHuevoList"></div>
                    </div>
                </div>
            `;

            $('btnRegCosto').onclick = async () => {
                const lote_id = $('cosLote').value;
                const fecha = $('cosFecha').value;
                const concepto = $('cosConcepto').value.trim();
                const monto = parseFloat($('cosMonto').value);
                if (!lote_id || !fecha || !concepto || isNaN(monto) || monto <= 0) {
                    showMsg('cosMsg', 'Todos los campos son obligatorios', 'error');
                    return;
                }
                try {
                    await dbCreateCosto({ lote_id: parseInt(lote_id), fecha, concepto, monto });
                    showMsg('cosMsg', 'Costo registrado', 'success');
                    await renderTab('costos', cont);
                } catch (e) { showMsg('cosMsg', e.message, 'error'); }
            };

            const loteMap = {};
            lotes.forEach(l => loteMap[l.id] = l.nombre);
            const listEl = $('cosList');
            if (!allCostos.length) {
                listEl.innerHTML = '<div class="empty-state"><i class="fas fa-coins"></i>Sin costos</div>';
            } else {
                listEl.innerHTML = allCostos.slice(0, 20).map(c => `
                    <div class="order-card">
                        <div><strong>${escHtml(c.concepto)}</strong> · <span style="color:#b8712a;font-weight:600;">${pesos(c.monto)}</span></div>
                        <div class="meta">${loteMap[c.lote_id] || 'N/A'} · ${fmtDateShort(c.fecha)}</div>
                    </div>
                `).join('');
            }

            // Costo por huevo
            const chEl = $('costoHuevoList');
            let chHtml =
                '<div class="table-wrap"><table class="table"><thead><tr><th>Lote</th><th>Total costos</th><th>Huevos</th><th>$/huevo</th><th>$/docena</th></tr></thead><tbody>';
            for (const l of lotesActivos) {
                const costos = allCostos.filter(c => c.lote_id === l.id);
                const totalC = costos.reduce((s, c) => s + c.monto, 0);
                const prods = await dbProduccionesByLote(l.id);
                const totalH = prods.reduce((s, p) => s + p.cantidad_huevos, 0);
                const ch = totalH > 0 ? (totalC / totalH).toFixed(2) : 'N/A';
                const cd = totalH > 0 ? ((totalC / totalH) * 12).toFixed(0) : 'N/A';
                chHtml +=
                    `<tr><td>${escHtml(l.nombre)}</td><td>${pesos(totalC)}</td><td>${totalH}</td><td>${ch !== 'N/A' ? pesos(ch) : ch}</td><td>${cd !== 'N/A' ? pesos(cd) : cd}</td></tr>`;
            }
            chHtml += '</tbody></table></div>';
            chEl.innerHTML = chHtml;
        }

        // ---------- INVENTARIO ----------
        async function renderInventario(cont) {
            cont.innerHTML = '<div class="loader">Cargando</div>';
            const inventario = await dbInventarioAlimento();
            const { data: movs } = await _sb.from('movimientos_alimento').select('*').order('fecha', { ascending: false })
                .limit(25);

            cont.innerHTML = `
                <div class="card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-boxes-stacked"></i> Stock actual de alimento</div></div>
                    <div id="invStockList"></div>
                </div>
                <div class="card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-plus-circle"></i> Actualizar / Agregar stock</div></div>
                    <div class="form-row c2">
                        <div class="form-group"><label>Tipo de alimento</label><input id="invTipo" placeholder="Ej: Postura" /></div>
                        <div class="form-group"><label>Stock (kg)</label><input type="number" id="invStock" step="0.1" min="0" value="0" /></div>
                    </div>
                    <button class="btn btn-primary" id="btnInvActualizar"><i class="fas fa-save"></i> Actualizar stock</button>
                    <div id="invMsg"></div>
                </div>
                <div class="card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-history"></i> Movimientos recientes</div></div>
                    <div id="invMovimientos"></div>
                </div>
            `;

            const stockEl = $('invStockList');
            if (!inventario.length) {
                stockEl.innerHTML = '<div class="empty-state"><i class="fas fa-boxes-stacked"></i>Sin registros</div>';
            } else {
                stockEl.innerHTML = inventario.map(i => {
                    const color = i.stock_kg < 10 ? 'red' : (i.stock_kg < 50 ? '' : 'green');
                    return `<div class="order-card ${color}">
                        <div><strong>${escHtml(i.tipo_alimento)}</strong> · <span style="font-weight:700;font-size:1.1rem;">${Number(i.stock_kg).toFixed(1)} kg</span>${i.stock_kg < 10 ? ' <span class="badge badge-inactive">Stock bajo</span>' : ''}</div>
                        <div class="meta">Actualizado: ${fmtDate(i.fecha_actualizacion)}</div>
                    </div>`;
                }).join('');
            }

            $('btnInvActualizar').onclick = async () => {
                const tipo = $('invTipo').value.trim();
                const stock = parseFloat($('invStock').value);
                if (!tipo || isNaN(stock) || stock < 0) {
                    showMsg('invMsg', 'Tipo y stock válido son obligatorios', 'error');
                    return;
                }
                try {
                    await dbUpdateInventarioAlimento(tipo, stock);
                    await dbRegistrarMovimientoAlimento(tipo, stock, 'Actualización manual');
                    showMsg('invMsg', 'Stock actualizado', 'success');
                    await renderTab('inventario', cont);
                } catch (e) { showMsg('invMsg', e.message, 'error'); }
            };

            const movEl = $('invMovimientos');
            if (!movs || !movs.length) {
                movEl.innerHTML = '<div class="empty-state"><i class="fas fa-history"></i>Sin movimientos</div>';
            } else {
                movEl.innerHTML = movs.map(m => `
                    <div class="order-card blue">
                        <div><strong>${escHtml(m.tipo_alimento)}</strong> · ${Number(m.cantidad_kg).toFixed(1)} kg · <em>${escHtml(m.motivo || 'N/A')}</em></div>
                        <div class="meta">${fmtDate(m.fecha)}</div>
                    </div>
                `).join('');
            }
        }

        // ---------- REPORTES ----------
        async function renderReportes(cont) {
            cont.innerHTML = `
                <div class="card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-download"></i> Exportar datos</div></div>
                    <div style="display:flex;flex-wrap:wrap;gap:0.75rem;">
                        <button class="btn btn-primary btn-sm" id="expLotes"><i class="fas fa-layer-group"></i> CSV Lotes</button>
                        <button class="btn btn-primary btn-sm" id="expProduccion"><i class="fas fa-egg"></i> CSV Producción</button>
                        <button class="btn btn-primary btn-sm" id="expConsumos"><i class="fas fa-wheat-awn"></i> CSV Consumos</button>
                        <button class="btn btn-primary btn-sm" id="expSanidad"><i class="fas fa-stethoscope"></i> CSV Sanidad</button>
                        <button class="btn btn-primary btn-sm" id="expCostos"><i class="fas fa-coins"></i> CSV Costos</button>
                    </div>
                    <div id="reportMsg" class="mt-1"></div>
                </div>
                <div class="card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-chart-pie"></i> Resumen general (últimos 30 días)</div></div>
                    <div id="resumenGeneral"><div class="loader">Cargando</div></div>
                </div>
            `;

            const csvDownload = (csv, filename) => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
                a.download = filename;
                a.click();
            };

            $('expLotes').onclick = async () => {
                const { data } = await _sb.from('lotes').select('*');
                if (!data || !data.length) { alert('No hay datos'); return; }
                let csv = 'Código,Nombre,Fecha ingreso,Procedencia,Raza,Cantidad,Estado\n';
                data.forEach(l => {
                    csv +=
                        `"${l.codigo}","${l.nombre}","${l.fecha_ingreso}","${l.procedencia||''}","${l.raza||''}",${l.cantidad_inicial},"${l.estado}"\n`;
                });
                csvDownload(csv, 'lotes.csv');
            };
            $('expProduccion').onclick = async () => {
                const { data } = await _sb.from('produccion_diaria').select('*');
                if (!data || !data.length) { alert('No hay datos'); return; }
                let csv = 'Lote ID,Fecha,Cantidad,Clasificación\n';
                data.forEach(p => {
                    csv += `${p.lote_id},"${p.fecha}",${p.cantidad_huevos},"${p.clasificacion||''}"\n`;
                });
                csvDownload(csv, 'produccion.csv');
            };
            $('expConsumos').onclick = async () => {
                const { data } = await _sb.from('consumos_alimento').select('*');
                if (!data || !data.length) { alert('No hay datos'); return; }
                let csv = 'Lote ID,Fecha,Cantidad (kg),Tipo\n';
                data.forEach(c => {
                    csv += `${c.lote_id},"${c.fecha}",${c.cantidad_kg},"${c.tipo_alimento}"\n`;
                });
                csvDownload(csv, 'consumos.csv');
            };
            $('expSanidad').onclick = async () => {
                const { data } = await _sb.from('eventos_sanitarios').select('*');
                if (!data || !data.length) { alert('No hay datos'); return; }
                let csv = 'Lote ID,Fecha,Tipo,Cantidad,Descripción\n';
                data.forEach(s => {
                    csv +=
                        `${s.lote_id},"${s.fecha}","${s.tipo}",${s.cantidad||0},"${(s.descripcion||'').replace(/"/g,"'")}"\n`;
                });
                csvDownload(csv, 'sanidad.csv');
            };
            $('expCostos').onclick = async () => {
                const { data } = await _sb.from('costos_lote').select('*');
                if (!data || !data.length) { alert('No hay datos'); return; }
                let csv = 'Lote ID,Fecha,Concepto,Monto\n';
                data.forEach(c => {
                    csv +=
                    `${c.lote_id},"${c.fecha}","${c.concepto.replace(/"/g,"'")}",${c.monto}\n`;
                });
                csvDownload(csv, 'costos.csv');
            };

            // Resumen 30 días
            try {
                const lotes = await dbAllLotes();
                const hace30 = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
                let html =
                    '<div class="table-wrap"><table class="table"><thead><tr><th>Lote</th><th>Estado</th><th>Huevos (30d)</th><th>Consumo (kg)</th><th>Mortalidad</th><th>Costo total</th><th>$/huevo</th></tr></thead><tbody>';
                for (const l of lotes) {
                    const prods = (await dbProduccionesByLote(l.id)).filter(p => new Date(p.fecha) >= hace30);
                    const totalH = prods.reduce((s, p) => s + p.cantidad_huevos, 0);
                    const consumos = (await dbConsumosByLote(l.id)).filter(c => new Date(c.fecha) >= hace30);
                    const totalKg = consumos.reduce((s, c) => s + c.cantidad_kg, 0);
                    const san = await dbSanitariosByLote(l.id);
                    const muertes = san.filter(s => s.tipo === 'muerte').reduce((s, e) => s + (e.cantidad || 0), 0);
                    const costos = await dbCostosByLote(l.id);
                    const totalC = costos.reduce((s, c) => s + c.monto, 0);
                    const cph = totalH > 0 ? pesos((totalC / totalH).toFixed(2)) : 'N/A';
                    html += `<tr>
                        <td>${escHtml(l.nombre)}</td>
                        <td><span class="badge badge-${l.estado === 'activo' ? 'active' : 'inactive'}">${l.estado}</span></td>
                        <td>${totalH}</td>
                        <td>${Number(totalKg).toFixed(1)}</td>
                        <td>${muertes}</td>
                        <td>${pesos(totalC)}</td>
                        <td>${cph}</td>
                    </tr>`;
                }
                html += '</tbody></table></div>';
                $('resumenGeneral').innerHTML = html;
            } catch (e) {
                $('resumenGeneral').innerHTML =
                    `<div class="alert alert-error">Error al cargar resumen: ${escHtml(e.message)}</div>`;
            }
        }

        // ================================================================
        //   MODALES
        // ================================================================
        function initModals() {
            $('closeSupportBtn').onclick = () => $('supportModal').classList.add('hidden');
            $('supportModal').onclick = (e) => { if (e.target === $('supportModal')) $('supportModal').classList.add(
                    'hidden'); };
            $('forgotModal').onclick = (e) => { if (e.target === $('forgotModal')) $('forgotModal').classList.add(
                    'hidden'); };
            $('newPasswordModal').onclick = (e) => { if (e.target === $('newPasswordModal')) $('newPasswordModal')
                .classList.add('hidden'); };
        }

        // ================================================================
        //   BOOT
        // ================================================================
        (async function boot() {
            initModals();

            // Recuperación de contraseña desde token
            const hash = new URLSearchParams(window.location.hash.substring(1));
            const token = hash.get('access_token');
            const type = hash.get('type');
            if (token && type === 'recovery') {
                $('newPasswordModal').classList.remove('hidden');
                $('newPassword').value = '';
                $('confirmPassword').value = '';
                $('newPassMsg').innerHTML = '';
                window.location.hash = '';
            }

            // Logo file input
            $('logoFileInput').onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 3 * 1024 * 1024) { alert('El logo debe pesar menos de 3 MB.'); return; }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    lsSet('granjaLogo', ev.target.result);
                    setLogoEl($('adminTopLogo'));
                    const authIcon = document.querySelector('.auth-brand .logo-icon');
                    if (authIcon) authIcon.innerHTML =
                        `<img src="${escAttr(ev.target.result)}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;display:block;margin:0 auto;" />`;
                };
                reader.readAsDataURL(file);
            };

            const sessionRes = await _sb.auth.getSession();
            if (!sessionRes.data.session) {
                $('authPage').style.display = 'flex';
                initAuthPage();
                return;
            }

            const session = sessionRes.data.session;
            try {
                G.userId = session.user.id;
                const profile = await dbProfile(G.userId);
                G.esAdmin = profile.es_admin || false;
                G.nombre = profile.nombre || session.user.email || 'Usuario';
                G.email = profile.email || session.user.email || '';

                if (!G.esAdmin) {
                    alert('Acceso restringido a administradores. Contacta al soporte.');
                    await _sb.auth.signOut();
                    location.reload();
                    return;
                }
            } catch (e) {
                console.error('Error cargando perfil:', e);
                await _sb.auth.signOut();
                $('authPage').style.display = 'flex';
                initAuthPage();
                showMsg('loginErr', 'Error al cargar perfil. Por favor inicia sesión nuevamente.', 'warn');
                return;
            }

            $('authPage').style.display = 'none';
            $('adminPage').classList.add('active');
            await initAdminPage();

            _sb.auth.onAuthStateChange((event) => {
                if (event === 'SIGNED_OUT') location.reload();
            });
        })();
    </script>

</body>
</html>
