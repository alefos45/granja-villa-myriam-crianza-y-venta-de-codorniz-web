<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granja Villa Myriam · Crianza</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4efe8;
            color: #2c1f14;
            min-height: 100vh;
        }
        .hidden {
            display: none !important;
        }
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- AUTH PAGE --- */
        #authPage {
            background: linear-gradient(145deg, #1f1208 0%, #3d2412 50%, #5e371b 100%);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .auth-card {
            background: #fffdf9;
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .auth-brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-brand img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 2px solid #b87a3a;
        }
        .auth-brand h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #f0d8b0;
            margin: 0;
        }
        .auth-brand p {
            color: #c7aa84;
            font-size: 0.9rem;
        }
        .auth-tabs {
            display: flex;
            background: #efe8e0;
            border-radius: 40px;
            padding: 4px;
            margin-bottom: 24px;
        }
        .auth-tab {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 16px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #6b4f33;
        }
        .auth-tab.active {
            background: #b87a3a;
            color: white;
            box-shadow: 0 4px 12px rgba(184, 122, 58, 0.3);
        }
        .form-row {
            display: grid;
            gap: 14px;
            margin-bottom: 14px;
        }
        .form-row.c2 {
            grid-template-columns: 1fr 1fr;
        }
        .fg label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #6b4f33;
        }
        .fg input,
        .fg select,
        .fg textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #dccfc0;
            border-radius: 12px;
            font-size: 0.95rem;
            background: white;
            transition: 0.2s;
            font-family: inherit;
        }
        .fg input:focus {
            border-color: #b87a3a;
            outline: none;
            box-shadow: 0 0 0 3px rgba(184, 122, 58, 0.15);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: #b87a3a;
            color: white;
        }
        .btn-primary:hover {
            background: #9a6430;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 122, 58, 0.35);
        }
        .btn-block {
            width: 100%;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
        }
        .btn-ghost {
            background: #e8e0d8;
            color: #4d3624;
        }
        .btn-ghost:hover {
            background: #d6ccc0;
        }
        .btn-success {
            background: #3a7a4a;
            color: white;
        }
        .btn-success:hover {
            background: #2d5f3a;
        }
        .btn-danger {
            background: #b84a3a;
            color: white;
        }
        .btn-danger:hover {
            background: #9a3a2a;
        }
        .btn-info {
            background: #2a6a8a;
            color: white;
        }
        .btn-info:hover {
            background: #1f5270;
        }
        .alert {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .alert-error {
            background: #fde8e5;
            color: #b84a3a;
            border: 1px solid #f5c6c1;
        }
        .alert-success {
            background: #e5f4e8;
            color: #2d6a3a;
            border: 1px solid #b7dbb7;
        }
        .link-forgot {
            color: #b87a3a;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .link-forgot:hover {
            text-decoration: underline;
        }

        /* --- TOPBAR --- */
        .topbar {
            background: white;
            border-bottom: 1px solid #e0d5c8;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-logo {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            background: #e8e0d8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            border: 2px solid #b87a3a;
        }
        .topbar-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .topbar-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #2c1f14;
        }
        .topbar-sub {
            font-size: 0.75rem;
            color: #7a5f44;
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            background: #e8e0ff;
            color: #4a2b7a;
        }

        /* --- TAB NAV --- */
        .tab-nav {
            background: white;
            border-bottom: 1px solid #e0d5c8;
            overflow-x: auto;
            padding: 0 16px;
        }
        .tab-nav-inner {
            display: flex;
            gap: 4px;
            min-width: max-content;
        }
        .tab-btn {
            padding: 12px 18px;
            border: none;
            background: transparent;
            border-bottom: 3px solid transparent;
            font-weight: 500;
            font-size: 0.9rem;
            color: #6b4f33;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: inherit;
        }
        .tab-btn.active {
            border-bottom-color: #b87a3a;
            color: #2c1f14;
            font-weight: 600;
        }
        .tab-btn:hover {
            background: #f5efe8;
        }

        /* --- MAIN --- */
        .main {
            flex: 1;
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }

        /* --- CARDS --- */
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
            border: 1px solid #ece3d9;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px dashed #e0d5c8;
            padding-bottom: 12px;
        }
        .card-title i {
            color: #b87a3a;
        }

        /* --- GRIDS --- */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* --- STAT CARDS --- */
        .stat-card {
            background: #f8f3ec;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e8ddd0;
        }
        .stat-val {
            font-size: 1.8rem;
            font-weight: 700;
            color: #b87a3a;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #6b4f33;
            margin-top: 4px;
        }
        .stat-icon {
            font-size: 1.4rem;
            color: #b87a3a;
            margin-bottom: 6px;
        }

        /* --- TABLES --- */
        .data-table-wrap {
            overflow-x: auto;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }
        .data-table th {
            background: #f5efe8;
            padding: 10px 12px;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #5a3f2a;
        }
        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e8ddd0;
            font-size: 0.9rem;
            vertical-align: middle;
        }
        .data-table tr:hover td {
            background: #faf6f0;
        }

        /* --- ORDER CARDS --- */
        .order-card {
            background: #f8f3ec;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border-left: 4px solid #b87a3a;
            border: 1px solid #e8ddd0;
        }
        .order-card.green {
            border-left-color: #3a7a4a;
        }
        .order-card.red {
            border-left-color: #b84a3a;
        }
        .order-card.blue {
            border-left-color: #2a6a8a;
        }
        .order-date {
            font-size: 0.75rem;
            color: #7a5f44;
            margin-top: 4px;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 28px;
            max-width: 520px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            border-bottom: 1px solid #e0d5c8;
            padding-bottom: 12px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* --- FOOTER --- */
        .app-footer {
            background: white;
            border-top: 1px solid #e0d5c8;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .footer-copy {
            font-size: 0.8rem;
            color: #7a5f44;
        }
        .footer-links {
            display: flex;
            gap: 8px;
        }

        /* --- LOADER --- */
        .loader {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #7a5f44;
            font-style: italic;
        }
        .loader::after {
            content: '';
            width: 28px;
            height: 28px;
            border: 3px solid #dccfc0;
            border-top-color: #b87a3a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- CHART --- */
        .chart-wrap {
            position: relative;
            height: 220px;
        }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7a5f44;
        }
        .empty-state i {
            font-size: 2.4rem;
            color: #dccfc0;
            margin-bottom: 12px;
        }

        /* --- KPI BAR --- */
        .kpi-bar {
            background: #f8f3ec;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .grid-2,
            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr;
            }
            .form-row.c2 {
                grid-template-columns: 1fr;
            }
            .auth-card {
                padding: 24px 16px;
            }
            .topbar {
                padding: 10px 16px;
            }
            .main {
                padding: 16px;
            }
        }

        /* Override para que el logo se vea bien */
        .topbar-logo img {
            display: block;
        }
    </style>
</head>
<body>

    <!-- ========== AUTH PAGE ========== -->
    <div id="authPage" class="page">
        <div class="auth-card">
            <div class="auth-brand">
                <img src="logo.svg" alt="Logo" id="authLogoImg" style="display:block; margin:0 auto 10px;">
                <h1>Granja Villa Myriam</h1>
                <p>Gestión de Crianza</p>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLoginBtn">Iniciar sesión</button>
                <button class="auth-tab" id="tabRegisterBtn">Registrarse</button>
            </div>
            <!-- Login -->
            <div id="loginPanel">
                <div class="form-row">
                    <div class="fg">
                        <label>Correo electrónico</label>
                        <input type="email" id="loginEmail" placeholder="admin@finca.com">
                    </div>
                    <div class="fg">
                        <label>Contraseña</label>
                        <input type="password" id="loginPass" placeholder="••••••••">
                    </div>
                </div>
                <div id="loginErr"></div>
                <button class="btn btn-primary btn-block" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Ingresar</button>
                <div style="text-align:right; margin-top:12px;">
                    <span class="link-forgot" id="forgotLink">¿Olvidaste tu contraseña?</span>
                </div>
            </div>
            <!-- Register -->
            <div id="registerPanel" class="hidden">
                <div class="form-row c2">
                    <div class="fg"><label>Nombre completo</label><input type="text" id="regNombre" placeholder="Juan Pérez"></div>
                    <div class="fg"><label>Cédula / Documento</label><input type="text" id="regDocumento" placeholder="123456789"></div>
                </div>
                <div class="form-row c2">
                    <div class="fg"><label>Edad</label><input type="number" id="regEdad" placeholder="30"></div>
                    <div class="fg"><label>Correo electrónico</label><input type="email" id="regEmail" placeholder="admin@finca.com"></div>
                </div>
                <div class="form-row">
                    <div class="fg"><label>Contraseña (mínimo 6 caracteres)</label><input type="password" id="regPassword" placeholder="••••••••"></div>
                </div>
                <div id="registerErr"></div>
                <button class="btn btn-primary btn-block" id="registerBtn"><i class="fas fa-user-plus"></i> Crear cuenta</button>
                <p style="font-size:0.75rem;color:#7a5f44;text-align:center;margin-top:10px;">Solo personal autorizado puede registrarse</p>
            </div>
        </div>
        <div id="footerAuth" style="margin-top:20px; width:100%; max-width:440px;"></div>
    </div>

    <!-- ========== ADMIN PAGE ========== -->
    <div id="adminPage" class="page hidden">
        <header class="topbar">
            <div class="topbar-brand">
                <div class="topbar-logo" id="adminTopLogo" title="Cambiar logo"><img src="logo.svg" alt="Logo"></div>
                <div>
                    <div class="topbar-title">Granja Villa Myriam</div>
                    <div class="topbar-sub">Panel de Crianza</div>
                </div>
            </div>
            <div class="topbar-actions">
                <span class="badge"><i class="fas fa-shield-alt"></i> Administrador</span>
                <span id="adminWelcome" style="font-weight:500;"></span>
                <button class="btn btn-ghost btn-sm" id="adminLogout"><i class="fas fa-sign-out-alt"></i> Salir</button>
            </div>
        </header>
        <nav class="tab-nav">
            <div class="tab-nav-inner" id="adminTabNav"></div>
        </nav>
        <main class="main" id="adminMain"></main>
        <div id="footerAdmin"></div>
    </div>

    <!-- ========== MODALES ========== -->
    <div id="supportModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-title"><i class="fas fa-headset"></i> Soporte</div>
            <p><i class="fab fa-whatsapp" style="color:#3a7a4a;"></i> <strong>WhatsApp:</strong> 305 412 6770</p>
            <p><i class="fas fa-phone"></i> <strong>Teléfono:</strong> 305 868 60 94</p>
            <p><i class="fas fa-envelope"></i> <strong>Email:</strong> soporte@granjavilla.com</p>
            <div class="modal-actions"><button class="btn btn-ghost" id="closeSupportBtn">Cerrar</button></div>
        </div>
    </div>

    <div id="forgotModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-title">Recuperar contraseña</div>
            <div class="fg"><label>Correo electrónico</label><input type="email" id="resetEmail" placeholder="admin@finca.com"></div>
            <div id="resetMsg"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="sendResetBtn">Enviar instrucciones</button>
                <button class="btn btn-ghost" id="closeForgotBtn">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="newPasswordModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-title">Nueva contraseña</div>
            <div class="fg"><label>Nueva contraseña</label><input type="password" id="newPassword" placeholder="••••••••"></div>
            <div class="fg"><label>Confirmar contraseña</label><input type="password" id="confirmPassword" placeholder="••••••••"></div>
            <div id="newPassMsg"></div>
            <div class="modal-actions">
                <button class="btn btn-success" id="updatePasswordBtn">Actualizar</button>
                <button class="btn btn-ghost" id="closeNewPassBtn">Cancelar</button>
            </div>
        </div>
    </div>

    <input type="file" id="logoFileInput" accept="image/*" style="display:none">

    <script>
        // ============================================================
        //  CONFIGURACIÓN SUPABASE
        // ============================================================
        const SUPABASE_URL = "https://dfzkhlclwdxrkokzbtra.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_9dkfwX7NGWw19ChZwMVF2A_cgQsdi8l";
        const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        //  ESTADO GLOBAL
        // ============================================================
        const G = {
            userId: null,
            esAdmin: false,
            nombre: '',
            email: '',
            charts: {}
        };
        const CHART_COLORS = ['#b87a3a', '#3a7a4a', '#2a6a8a', '#b84a3a', '#6a4a9a', '#d4903f', '#5a9a5a', '#4a9abf', '#c05040',
            '#8a6ab0'
        ];

        // ============================================================
        //  UTILIDADES
        // ============================================================
        function pesos(n) { return '$' + Number(n).toLocaleString('es-CO'); }

        function fmtDate(d) {
            try {
                const dt = new Date(d);
                return dt.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit',
                    minute: '2-digit' });
            } catch (_) { return String(d); }
        }

        function fmtDateShort(d) {
            try {
                const dt = new Date(d);
                return dt.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' });
            } catch (_) { return String(d); }
        }

        function todayISO() { return new Date().toISOString().slice(0, 10); }

        function showMsg(id, msg, type) {
            const el = document.getElementById(id);
            if (el) el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        }

        function clearMsg(id) { const el = document.getElementById(id); if (el) el.innerHTML = ''; }

        function gid(id) { return document.getElementById(id); }

        function escAttr(s) { return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;'); }

        function escHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (_) {} }

        function lsGet(k) { try { return localStorage.getItem(k) || null; } catch (_) { return null; } }

        function destroyChart(key) {
            if (G.charts[key]) { try { G.charts[key].destroy(); } catch (_) {} G.charts[key] = null; }
        }

        function lastNDays(n) {
            const arr = [];
            for (let i = n - 1; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                arr.push(d.toISOString().slice(0, 10));
            }
            return arr;
        }

        function setLogoEl(el) {
            const saved = lsGet('granjaLogo');
            if (saved) {
                el.innerHTML = `<img src="${escAttr(saved)}" alt="Logo">`;
            } else {
                el.innerHTML = `<img src="logo.svg" alt="Logo" onerror="this.parentElement.innerHTML='🐔'">`;
            }
        }

        function updateAuthLogo() {
            const img = gid('authLogoImg');
            const saved = lsGet('granjaLogo');
            if (saved && img) { img.src = saved;
                img.style.display = 'block'; }
        }

        function renderFooter(id) {
            const el = gid(id);
            if (!el) return;
            el.innerHTML = `
                <div class="app-footer">
                    <div class="footer-links">

        async function dbLogin(email, pass) {
            const r = await _sb.auth.signInWithPassword({ email, password: pass });
            if (r.error) throw r.error;
            return r.data.user;
        }

        // Función de registro mejorada: inserta el perfil directamente,
        // sin depender del trigger, y maneja conflictos.
        async function dbRegister(email, pass, ud) {
            try {
                // 1. Crear usuario en Auth
                const r = await _sb.auth.signUp({ email, password: pass, options: { data: { nombre: ud.nombre } } });
                if (r.error) {
                    if (r.error.status === 429) throw new Error('RATE_LIMIT');
                    throw r.error;
                }
                if (!r.data.user) throw new Error('No se pudo crear el usuario.');
                const user_id = r.data.user.id;

                // 2. Insertar perfil en la tabla usuarios (directo, sin trigger)
                const { error: insertError } = await _sb
                    .from('usuarios')
                    .insert({
                        user_id: user_id,
                        nombre: ud.nombre,
                        documento: ud.documento,
                        edad: ud.edad,
                        email: email,
                        es_admin: false
                    });

                if (insertError) {
                    // Si el perfil ya existe (por ejemplo, por un registro anterior), actualizamos
                    if (insertError.code === '23505') {
                        await _sb.from('usuarios').update({
                            nombre: ud.nombre,
                            documento: ud.documento,
                            edad: ud.edad
                        }).eq('user_id', user_id);
                    } else {
                        throw new Error('Error al guardar el perfil: ' + insertError.message);
                    }
                }

                return r.data.user;
            } catch (e) {
                if (e.message === 'RATE_LIMIT') throw new Error(
                    'Demasiados intentos de registro. Espera 10 minutos y vuelve a intentarlo.');
                throw e;
            }
        }

        // dbProfile con reintentos
        async function dbProfile(uid) {
            let lastErr = null;
            for (let i = 0; i < 4; i++) {
                if (i > 0) await new Promise(res => setTimeout(res, 600 * i));
                const r = await _sb.from('usuarios').select('*').eq('user_id', uid).single();
                if (!r.error) return r.data;
                lastErr = r.error;
                if (r.error.code !== 'PGRST116') break;
            }
            throw lastErr;
        }

        // ---------- DASHBOARD ----------
        async function renderDashboard(cont) {
            cont.innerHTML = '<div class="loader">Cargando...</div>';
            const lotes = await dbAllLotes();
            const lotesActivos = lotes.filter(l => l.estado === 'activo');
            const hoy = todayISO();
            let totalHuevosHoy = 0,
                totalAves = 0,
                totalMuertes = 0;
            let todasProducciones = [];
            for (const l of lotesActivos) {
                totalAves += l.cantidad_inicial;
                const prods = await dbProduccionesByLote(l.id);
                todasProducciones = todasProducciones.concat(prods);
                const hoyProd = prods.filter(p => p.fecha === hoy);
                totalHuevosHoy += hoyProd.reduce((s, p) => s + p.cantidad_huevos, 0);
                const san = await dbSanitariosByLote(l.id);
                totalMuertes += san.filter(s => s.tipo === 'muerte').reduce((s, e) => s + (e.cantidad || 0), 0);
            }
            const pctPostura = totalAves > 0 ? ((totalHuevosHoy / totalAves) * 100).toFixed(1) : '0.0';
            const mortalidad = totalAves > 0 ? ((totalMuertes / totalAves) * 100).toFixed(2) : '0.00';

            cont.innerHTML = `
                <div class="grid-4" style="margin-bottom:24px;">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-layer-group"></i></div><div class="stat-val">${lotesActivos.length}</div><div class="stat-label">Lotes activos</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-dove"></i></div><div class="stat-val">${totalAves}</div><div class="stat-label">Aves en producción</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-egg"></i></div><div class="stat-val">${totalHuevosHoy}</div><div class="stat-label">Huevos hoy</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-percent"></i></div><div class="stat-val">${pctPostura}%</div><div class="stat-label">% Postura hoy</div></div>
                </div>
                <div class="grid-2">
                    <div class="card"><div class="card-title"><i class="fas fa-list"></i> Lotes activos</div><div id="dashLotesList"></div></div>
                    <div class="card"><div class="card-title"><i class="fas fa-skull" style="color:#b84a3a;"></i> Mortalidad: ${mortalidad}%</div>
                        <div class="kpi-bar"><span>Muertes acumuladas: <strong>${totalMuertes}</strong> aves</span></div>
                        <div id="dashExtraStats"></div>
                    </div>
                </div>
                <div class="card"><div class="card-title"><i class="fas fa-chart-line"></i> Producción últimos 7 días</div><div class="chart-wrap"><canvas id="dashChart"></canvas></div></div>
            `;

            const listEl = gid('dashLotesList');
            if (!lotesActivos.length) {
                listEl.innerHTML = '<div class="empty-state"><i class="fas fa-layer-group"></i>No hay lotes activos</div>';
            } else {
                listEl.innerHTML = lotesActivos.map(l => {
                    const prods = todasProducciones.filter(p => p.lote_id === l.id);
                    const totalP = prods.reduce((s, p) => s + p.cantidad_huevos, 0);
                    const avg = prods.length ? (totalP / prods.length).toFixed(0) : 0;
                    const dias = Math.floor((new Date() - new Date(l.fecha_ingreso)) / (1000 * 60 * 60 * 24));
                    return `<div class="order-card"><div><strong>${escHtml(l.nombre)}</strong> <span class="badge" style="background:#d4edda;color:#155724;">${l.estado}</span></div>
                            <div style="font-size:0.85rem;color:#6b4f33;">${l.cantidad_inicial} aves · ${dias} días · Prom ${avg} hv/día</div></div>`;
                }).join('');
            }

            const total30 = todasProducciones.filter(p => new Date(p.fecha) >= new Date(Date.now() - 30 * 24 * 60 * 60 *

                const tipo = gid('invTipo').value.trim();
                const stock = parseFloat(gid('invStock').value);
                if (!tipo || isNaN(stock) || stock < 0) { showMsg('invMsg', 'Tipo y stock válido son obligatorios',
                    'error'); return; }
                try {
                    await dbUpdateInventarioAlimento(tipo, stock);
                    await dbRegistrarMovimientoAlimento(tipo, stock, 'Actualización manual');
                    showMsg('invMsg', 'Inventario actualizado correctamente', 'success');
                    await renderAdminTab('inventario');
                } catch (e) { showMsg('invMsg', e.message, 'error'); }
            };

            const movEl = gid('invMovimientos');
            if (!movs || !movs.length) {
                movEl.innerHTML = '<div class="empty-state"><i class="fas fa-history"></i>Sin movimientos</div>';
            } else {
                movEl.innerHTML = movs.map(m =>
                    `<div class="order-card"><div><strong>${escHtml(m.tipo_alimento)}</strong> · ${Number(m.cantidad_kg).toFixed(1)} kg · <em>${escHtml(m.motivo||'N/A')}</em></div>
                    <div class="order-date">${fmtDate(m.fecha)}</div></div>`
                ).join('');
            }
        }

        // ---------- REPORTES ----------
        async function renderReportes(cont) {
            cont.innerHTML = `
                <div class="card"><div class="card-title"><i class="fas fa-download"></i> Exportar datos</div>
                    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;">
                        <button class="btn btn-primary btn-sm" id="expLotes"><i class="fas fa-layer-group"></i> Lotes</button>
                        <button class="btn btn-primary btn-sm" id="expProduccion"><i class="fas fa-egg"></i> Producción</button>
                        <button class="btn btn-primary btn-sm" id="expConsumos"><i class="fas fa-wheat-awn"></i> Consumos</button>
                        <button class="btn btn-primary btn-sm" id="expSanidad"><i class="fas fa-stethoscope"></i> Sanidad</button>
                        <button class="btn btn-primary btn-sm" id="expCostos"><i class="fas fa-coins"></i> Costos</button>
                    </div>
                    <div id="reportMsg"></div>
                </div>
                <div class="card"><div class="card-title"><i class="fas fa-chart-pie"></i> Resumen 30 días</div><div id="resumenGeneral"><div class="loader">Cargando...</div></div></div>
            `;

            function csvDownload(csv, filename) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
                a.download = filename;
                a.click();
            }

            gid('expLotes').onclick = async () => {
                const { data } = await _sb.from('lotes').select('*');
                if (!data || !data.length) { alert('No hay datos para exportar'); return; }
                let csv = 'Código,Nombre,Fecha,Procedencia,Raza,Cantidad,Estado\n';
                data.forEach(l => csv +=
                    `"${l.codigo}","${l.nombre}","${l.fecha_ingreso}","${l.procedencia||''}","${l.raza||''}",${l.cantidad_inicial},"${l.estado}"\n`
                    );
                csvDownload(csv, 'lotes.csv');
            };
            gid('expProduccion').onclick = async () => {
                const { data } = await _sb.from('produccion_diaria').select('*');
                if (!data || !data.length) { alert('No hay datos para exportar'); return; }
                let csv = 'Lote_ID,Fecha,Cantidad,Clasificación\n';
                data.forEach(p => csv +=
                    `${p.lote_id},"${p.fecha}",${p.cantidad_huevos},"${p.clasificacion||''}"\n`);
                csvDownload(csv, 'produccion.csv');
            };
            gid('expConsumos').onclick = async () => {
                const { data } = await _sb.from('consumos_alimento').select('*');
                if (!data || !data.length) { alert('No hay datos para exportar'); return; }
                let csv = 'Lote_ID,Fecha,Cantidad (kg),Tipo\n';
                data.forEach(c => csv += `${c.lote_id},"${c.fecha}",${c.cantidad_kg},"${c.tipo_alimento}"\n`);
                csvDownload(csv, 'consumos.csv');
            };
            gid('expSanidad').onclick = async () => {
                const { data } = await _sb.from('eventos_sanitarios').select('*');
                if (!data || !data.length) { alert('No hay datos para exportar'); return; }
                let csv = 'Lote_ID,Fecha,Tipo,Cantidad,Descripción\n';
                data.forEach(s => csv +=
                    `${s.lote_id},"${s.fecha}","${s.tipo}",${s.cantidad||0},"${(s.descripcion||'').replace(/"/g,"'")}"\n`
                    );
                csvDownload(csv, 'sanidad.csv');
            };
            gid('expCostos').onclick = async () => {
                const { data } = await _sb.from('costos_lote').select('*');
                if (!data || !data.length) { alert('No hay datos para exportar'); return; }
                let csv = 'Lote_ID,Fecha,Concepto,Monto\n';
                data.forEach(c => csv +=
                    `${c.lote_id},"${c.fecha}","${c.concepto.replace(/"/g,"'")}",${c.monto}\n`);
                csvDownload(csv, 'costos.csv');
            };

            // Resumen
            try {
                const lotes = await dbAllLotes();
                const hace30 = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
                let html =
                    '<div class="data-table-wrap"><table class="data-table"><thead><tr><th>Lote</th><th>Estado</th><th>Huevos</th><th>Consumo (kg)</th><th>Mortalidad</th><th>Costo total</th><th>$/huevo</th></tr></thead><tbody>';
                for (const l of lotes) {
                    const prods = (await dbProduccionesByLote(l.id)).filter(p => new Date(p.fecha) >= hace30);
                    const totalH = prods.reduce((s, p) => s + p.cantidad_huevos, 0);
                    const consumos = (await dbConsumosByLote(l.id)).filter(c => new Date(c.fecha) >= hace30);
                    const totalKg = consumos.reduce((s, c) => s + c.cantidad_kg, 0);
                    const san = await dbSanitariosByLote(l.id);
                    const muertes = san.filter(s => s.tipo === 'muerte').reduce((s, e) => s + (e.cantidad || 0), 0);
                    const costos = await dbCostosByLote(l.id);
                    const totalC = costos.reduce((s, c) => s + c.monto, 0);
                    const cph = totalH > 0 ? pesos((totalC / totalH).toFixed(2)) : 'N/A';
                    html +=
                        `<tr><td>${escHtml(l.nombre)}</td><td><span class="badge" style="background:${l.estado==='activo'?'#d4edda':'#fde8e5'};color:${l.estado==='activo'?'#155724':'#b84a3a'};">${l.estado}</span></td><td>${totalH}</td><td>${Number(totalKg).toFixed(1)}</td><td>${muertes}</td><td>${pesos(totalC)}</td><td>${cph}</td></tr>`;
                }
                html += '</tbody></table></div>';
                gid('resumenGeneral').innerHTML = html;
            } catch (e) {
                gid('resumenGeneral').innerHTML =
                    `<div class="alert alert-error">Error al cargar el resumen: ${escHtml(e.message)}</div>`;
            }
        }

        // ============================================================
        //  MODALES GLOBALES
        // ============================================================
        function initModals() {
            gid('closeSupportBtn').onclick = () => gid('supportModal').classList.add('hidden');
            gid('supportModal').addEventListener('click', e => { if (e.target === gid('supportModal')) gid(
                    'supportModal').classList.add('hidden'); });
            gid('forgotModal').addEventListener('click', e => { if (e.target === gid('forgotModal')) gid(
                    'forgotModal').classList.add('hidden'); });
            gid('newPasswordModal').addEventListener('click', e => { if (e.target === gid('newPasswordModal')) gid(
                    'newPasswordModal').classList.add('hidden'); });
        }

        // ============================================================
        //  BOOT — PUNTO DE ENTRADA PRINCIPAL
        // ============================================================
        (async function boot() {
            initModals();
            handleRecoveryToken();

            gid('logoFileInput').onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 3 * 1024 * 1024) { alert('El logo debe pesar menos de 3 MB.'); return; }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    lsSet('granjaLogo', ev.target.result);
                    setLogoEl(gid('adminTopLogo'));
                    updateAuthLogo();
                };
                reader.readAsDataURL(file);
            };

            const { data: { session } } = await _sb.auth.getSession();
            if (!session) {
                gid('authPage').classList.remove('hidden');
                initAuthPage();
                return;
            }

            try {
                G.userId = session.user.id;
                const profile = await dbProfile(G.userId);
                G.esAdmin = profile.es_admin || false;
                G.nombre = profile.nombre || session.user.email || 'Usuario';
                G.email = profile.email || session.user.email || '';
                if (!G.esAdmin) {
                    alert('Acceso restringido a administradores. Por favor, contacta al soporte.');
                    await _sb.auth.signOut();
                    location.reload();
                    return;
                }
            } catch (e) {
                console.error('Error al cargar el perfil:', e);
                await _sb.auth.signOut();
                gid('authPage').classList.remove('hidden');
                initAuthPage();
                showMsg('loginErr', 'Error al cargar el perfil. Inicia sesión nuevamente.', 'warn');
                return;
            }

            gid('authPage').classList.add('hidden');
            gid('adminPage').classList.remove('hidden');
            await initAdminPage();

            _sb.auth.onAuthStateChange((event) => {
                if (event === 'SIGNED_OUT') location.reload();
            });
        })();
    </script>
</body>
</html>
