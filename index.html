-- =================== EXTENSION ===================
create extension if not exists "uuid-ossp";

-- =================== TABLA: usuarios ===================
create table if not exists public.usuarios (
  id          bigserial primary key,
  user_id     uuid references auth.users(id) on delete cascade unique not null,
  nombre      text not null default '',
  documento   text,
  edad        integer,
  email       text,
  telefono    text,
  cargo       text default 'operario',
  es_admin    boolean default false,
  activo      boolean default true,
  created_at  timestamptz default now(),
  updated_at  timestamptz default now()
);
create index if not exists idx_usuarios_user_id on public.usuarios(user_id);
alter table public.usuarios enable row level security;
create policy "usr_own"       on public.usuarios for select using (auth.uid() = user_id);
create policy "usr_own_upd"   on public.usuarios for update using (auth.uid() = user_id);
create policy "admin_all_usr" on public.usuarios for all using (
  exists(select 1 from public.usuarios u where u.user_id = auth.uid() and u.es_admin = true)
);

-- =================== TABLA: galpones ===================
create table if not exists public.galpones (
  id           bigserial primary key,
  codigo       text unique not null,
  nombre       text not null,
  capacidad    integer not null default 0,
  descripcion  text,
  activo       boolean default true,
  created_at   timestamptz default now()
);
create index if not exists idx_galpones_activo on public.galpones(activo);
alter table public.galpones enable row level security;
create policy "admin_galpones" on public.galpones for all using (
  exists(select 1 from public.usuarios u where u.user_id = auth.uid() and u.es_admin = true)
);

-- =================== TABLA: lotes ===================
create table if not exists public.lotes (
  id               bigserial primary key,
  codigo           text unique not null,
  nombre           text not null,
  galpon_id        bigint references public.galpones(id) on delete set null,
  fecha_ingreso    date not null,
  raza             text default 'Coturnix japonica',
  cantidad_inicial integer not null check (cantidad_inicial > 0),
  machos           integer default 0,
  hembras          integer default 0,
  procedencia      text,
  estado           text default 'activo' check (estado in ('activo','inactivo','vendido','descartado')),
  semanas_vida     integer default 0,
  peso_promedio_g  numeric(6,2),
  created_by       uuid references auth.users(id),
  created_at       timestamptz default now(),
  updated_at       timestamptz default now()
);
create index if not exists idx_lotes_estado    on public.lotes(estado);
create index if not exists idx_lotes_galpon    on public.lotes(galpon_id);

alter table public.lotes enable row level security;
create policy "admin_lotes" on public.lotes for all using (
  exists(select 1 from public.usuarios u where u.user_id = auth.uid() and u.es_admin = true)
);

  huevos_rotos      integer default 0,
  clasificacion     text default 'sin clasificar',
  porcentaje_postura numeric(5,2),

  created_at        timestamptz default now(),

-- =================== VISTA RESUMEN LOTES ===================
create or replace view public.v_resumen_lotes as
select
  l.id, l.codigo, l.nombre, l.estado, l.cantidad_inicial,
  l.fecha_ingreso,
  extract(day from now() - l.fecha_ingreso::timestamptz)::int as dias_edad,
  coalesce(sum(p.huevos_total), 0)   as total_huevos,
  coalesce(count(distinct p.fecha), 0) as dias_produccion,
  coalesce(
    round(sum(p.huevos_total)::numeric / nullif(count(distinct p.fecha), 0), 1),
    0
  ) as promedio_diario,
  coalesce(sum(e.cantidad) filter (where e.tipo = 'muerte'), 0) as total_muertes,
  coalesce(sum(c.monto), 0) as total_costos,
  coalesce(sum(con.cantidad_kg), 0)  as total_alimento_kg
from public.lotes l
left join public.produccion_diaria  p   on p.lote_id = l.id
left join public.eventos_sanitarios e   on e.lote_id = l.id
left join public.costos_lote        c   on c.lote_id = l.id
left join public.consumos_alimento  con on con.lote_id = l.id
group by l.id, l.codigo, l.nombre, l.estado, l.cantidad_inicial, l.fecha_ingreso;

-- =================== TRIGGER: updated_at lotes ===================
create or replace function public.set_updated_at()
returns trigger language plpgsql as $$
begin new.updated_at = now(); return new; end;$$;

drop trigger if exists trg_lotes_upd on public.lotes;
create trigger trg_lotes_upd before update on public.lotes
  for each row execute function public.set_updated_at();

-- =================== TRIGGER: perfil automático ===================
drop trigger if exists on_auth_user_created on auth.users;
drop function if exists public.handle_new_user();
create or replace function public.handle_new_user()
returns trigger language plpgsql security definer set search_path = public
as $$
begin
  insert into public.usuarios (user_id, nombre, email, es_admin)
  values (new.id, coalesce(new.raw_user_meta_data->>'nombre',''), new.email, false)
  on conflict (user_id) do nothing;
  return new;
end;$$;
create trigger on_auth_user_created
  after insert on auth.users
  for each row execute function public.handle_new_user();

-- =================== FUNCIÓN RPC: dashboard_kpis (evita N+1) ===================
create or replace function public.fn_dashboard_kpis(p_fecha date default current_date)
returns json language plpgsql security definer as $$
declare
  v_result json;
begin
  select json_build_object(
    'lotes_activos',    count(*) filter (where l.estado = 'activo'),
    'total_aves',       coalesce(sum(l.cantidad_inicial) filter (where l.estado = 'activo'), 0),
    'huevos_hoy',       coalesce((select sum(p2.huevos_total) from produccion_diaria p2
                          join lotes l2 on l2.id = p2.lote_id
                          where l2.estado = 'activo' and p2.fecha = p_fecha), 0),
    'total_muertes',    coalesce(sum(e.cantidad) filter (where e.tipo = 'muerte'), 0),
    'total_ventas_mes', coalesce((select sum(v.total) from ventas v
                          where v.estado = 'pagado'
                          and date_trunc('month', v.fecha::timestamptz) = date_trunc('month', now())), 0),
    'total_lotes',      count(*)
  ) into v_result
  from lotes l
  left join eventos_sanitarios e on e.lote_id = l.id;
  return v_result;
end;$$;

-- =================== FUNCIÓN RPC: produccion_ultimos_dias ===================
create or replace function public.fn_produccion_dias(p_dias int default 7)
returns table(fecha date, total_huevos bigint) language sql security definer as $$
  select p.fecha, sum(p.huevos_total) as total_huevos
  from produccion_diaria p
  join lotes l on l.id = p.lote_id
  where l.estado = 'activo'
    and p.fecha >= current_date - (p_dias - 1)
  group by p.fecha
  order by p.fecha asc;
$$;

    if (r.error) {
        if (r.error.status === 429) throw new Error('Demasiados intentos. Espera 10 minutos.');

}

async function dbInventarioAlimento() {
    const r = await _sb.from('inventario_alimento').select('*').order('tipo_alimento');
    if (r.error) throw r.error;
    return r.data || [];
}
async function dbUpdateInventarioAlimento(tipo, stock, costo, proveedor) {
    const r = await _sb.from('inventario_alimento').upsert({
        tipo_alimento: tipo, stock_kg: stock,
        costo_kg: costo || 0, proveedor: proveedor || null,
        fecha_actualizacion: new Date().toISOString()
    }, { onConflict: 'tipo_alimento' });
    if (r.error) throw r.error;
}
async function dbMovimientoAlimento(tipo, cantidad, motivo, tipo_mov='ingreso') {
    const r = await _sb.from('movimientos_alimento').insert({ tipo_alimento: tipo, cantidad_kg: cantidad, motivo, tipo_mov });
    if (r.error) throw r.error;
}

// ============================================================
//  AUTH — RECUPERACIÓN DE CONTRASEÑA
// ============================================================
function initForgotPassword() {
    gid('forgotLink').onclick = () => {
        gid('forgotModal').classList.remove('hidden');
        gid('resetEmail').value = ''; clearMsg('resetMsg');
    };
    gid('closeForgotBtn').onclick = () => gid('forgotModal').classList.add('hidden');
    gid('closeNewPassBtn').onclick = () => gid('newPasswordModal').classList.add('hidden');

    gid('sendResetBtn').onclick = async () => {
        const email = gid('resetEmail').value.trim();
        if (!email) { showMsg('resetMsg','Ingresa tu correo','error'); return; }
        const btn = gid('sendResetBtn');
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
        try {
            const { error } = await _sb.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + window.location.pathname });
            if (error) throw error;
            showMsg('resetMsg','Instrucciones enviadas. Revisa tu correo.','success');
            setTimeout(() => gid('forgotModal').classList.add('hidden'), 3000);
        } catch(e) { showMsg('resetMsg', e.message,'error'); }
        finally { btn.disabled = false; btn.innerHTML = 'Enviar instrucciones'; }
    };

    gid('updatePasswordBtn').onclick = async () => {
        const np = gid('newPassword').value, cp = gid('confirmPassword').value;
        if (!np || np.length < 6) { showMsg('newPassMsg','Mínimo 6 caracteres','error'); return; }
        if (np !== cp) { showMsg('newPassMsg','Las contraseñas no coinciden','error'); return; }
        const btn = gid('updatePasswordBtn');
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Actualizando...';
        try {
            const { error } = await _sb.auth.updateUser({ password: np });
            if (error) throw error;
            showMsg('newPassMsg','Contraseña actualizada.','success');
            setTimeout(() => gid('newPasswordModal').classList.add('hidden'), 2000);
        } catch(e) { showMsg('newPassMsg', e.message,'error'); }
        finally { btn.disabled = false; btn.innerHTML = 'Actualizar'; }
    };
}
function handleRecoveryToken() {
    const h = new URLSearchParams(window.location.hash.substring(1));
    if (h.get('access_token') && h.get('type') === 'recovery') {
        gid('newPasswordModal').classList.remove('hidden');
        gid('newPassword').value = ''; gid('confirmPassword').value = ''; gid('newPassMsg').innerHTML = '';
        window.location.hash = '';
    }
}

function initAuthPage() {
    const tL=gid('tabLoginBtn'), tR=gid('tabRegisterBtn'), pL=gid('loginPanel'), pR=gid('registerPanel');
    tL.onclick = () => { tL.classList.add('active'); tR.classList.remove('active'); pL.classList.remove('hidden'); pR.classList.add('hidden'); clearMsg('loginErr'); };
    tR.onclick = () => { tR.classList.add('active'); tL.classList.remove('active'); pR.classList.remove('hidden'); pL.classList.add('hidden'); clearMsg('registerErr'); };
    [gid('loginEmail'), gid('loginPass')].forEach(el => el.addEventListener('keydown', e => { if (e.key==='Enter') gid('loginBtn').click(); }));

    gid('loginBtn').onclick = async () => {
        const email = gid('loginEmail').value.trim(), pass = gid('loginPass').value;
        if (!email || !pass) { showMsg('loginErr','Completa todos los campos','error'); return; }
        const btn = gid('loginBtn');
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ingresando...';
        try { await dbLogin(email, pass); location.reload(); }
        catch(e) { showMsg('loginErr', e.message,'error'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar'; }
    };

    gid('registerBtn').onclick = async () => {
        const email = gid('regEmail').value.trim(), pass = gid('regPassword').value;
        const ud = { nombre: gid('regNombre').value.trim(), documento: gid('regDocumento').value.trim(), edad: parseInt(gid('regEdad').value)||null };
        if (!email || !pass || !ud.nombre || !ud.documento) { showMsg('registerErr','Nombre, documento, correo y contraseña son obligatorios','error'); return; }
        if (pass.length < 6) { showMsg('registerErr','La contraseña debe tener al menos 6 caracteres','error'); return; }
        const btn = gid('registerBtn');
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registrando...';
        try {
            await dbRegister(email, pass, ud);
            showMsg('registerErr','Cuenta creada. Ahora inicia sesión.','success');
            setTimeout(() => tL.click(), 1500);
        } catch(e) { showMsg('registerErr', e.message||'Error al registrar','error'); }
        finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Crear cuenta'; }
    };

    renderFooter('footerAuth');
    updateAuthLogo();
    initForgotPassword();
}

        { id:'produccion',   label:'<i class="fas fa-egg"></i> Producción' },

        { id:'alimentacion', label:'<i class="fas fa-wheat-awn"></i> Alimentación' },
        { id:'sanidad',      label:'<i class="fas fa-stethoscope"></i> Sanidad' },
        { id:'costos',       label:'<i class="fas fa-coins"></i> Costos' },
        { id:'ventas',       label:'<i class="fas fa-store"></i> Ventas' },
        { id:'inventario',   label:'<i class="fas fa-boxes-stacked"></i> Inventario' },
        { id:'galpones',     label:'<i class="fas fa-warehouse"></i> Galpones' },
        { id:'reportes',     label:'<i class="fas fa-chart-bar"></i> Reportes' }
    ];
    const nav = gid('adminTabNav'), main = gid('adminMain');
    nav.innerHTML  = tabs.map((t,i) => `<button class="tab-btn ${i===0?'active':''}" data-atab="${t.id}">${t.label}</button>`).join('');
    main.innerHTML = tabs.map(t => `<div id="atab-${t.id}" class="panel ${t.id==='dashboard'?'active':''}"></div>`).join('');

    nav.querySelectorAll('[data-atab]').forEach(btn => {
        btn.onclick = async () => {
            nav.querySelectorAll('[data-atab]').forEach(b => b.classList.remove('active'));
            main.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            gid(`atab-${btn.dataset.atab}`).classList.add('active');
            // FIX: destruir charts del tab anterior
            destroyAllCharts();
            await renderAdminTab(btn.dataset.atab);
        };

    await renderAdminTab('dashboard');
    renderFooter('footerAdmin');
}

async function renderAdminTab(tab) {
    const cont = gid(`atab-${tab}`);
    if (!cont) return;
    try {
        switch(tab) {
            case 'dashboard':    await renderDashboard(cont); break;
            case 'lotes':        await renderLotes(cont); break;
            case 'produccion':   await renderProduccion(cont); break;
            case 'incubacion':   await renderIncubacion(cont); break;
            case 'alimentacion': await renderAlimentacion(cont); break;
            case 'sanidad':      await renderSanidad(cont); break;
            case 'costos':       await renderCostos(cont); break;
            case 'ventas':       await renderVentas(cont); break;
            case 'inventario':   await renderInventario(cont); break;
            case 'galpones':     await renderGalpones(cont); break;
            case 'reportes':     await renderReportes(cont); break;
        }
    } catch(e) {
        cont.innerHTML = `<div class="alert alert-error"><i class="fas fa-circle-exclamation"></i> Error: ${escHtml(e.message)}</div>`;
        console.error('renderAdminTab error:', e);
    }
}

// ============================================================
//  DASHBOARD — FIX: single-pass queries, elimina N+1
// ============================================================
async function renderDashboard(cont) {
    cont.innerHTML = '<div class="loader">Cargando dashboard...</div>';

    // Cargar datos en paralelo — 2 requests totales, no N*3
    const lotes = await dbAllLotes();
    const lotesActivos = lotes.filter(l => l.estado === 'activo');
    const ids = lotesActivos.map(l => l.id);
    const hoy = todayISO();

    const [todasProd, todosSan, allVentas] = await Promise.all([
        dbProduccionesAllLotes(ids),
        dbSanitariosAllLotes(ids),
        dbAllVentas()
    ]);

    // Calcular KPIs
    const huevosHoy  = todasProd.filter(p => p.fecha === hoy).reduce((s,p) => s+p.huevos_total, 0);
    const totalAves  = lotesActivos.reduce((s,l) => s+l.cantidad_inicial, 0);
    const totalMuertes = todosSan.filter(s => s.tipo==='muerte').reduce((s,e) => s+(e.cantidad||0), 0);
    const pctPostura = totalAves > 0 ? ((huevosHoy/totalAves)*100).toFixed(1) : '0.0';
    const ventasMes  = allVentas.filter(v => v.estado==='pagado' && v.fecha >= todayISO().slice(0,7))
        .reduce((s,v) => s+v.total, 0);
    const totalHuevos30 = todasProd.filter(p => new Date(p.fecha) >= new Date(Date.now()-30*86400000))
        .reduce((s,p) => s+p.huevos_total, 0);

    cont.innerHTML = `
        <div class="grid-4 mb-16">
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-layer-group"></i></div>
                <div class="stat-val">${lotesActivos.length}</div><div class="stat-label">Lotes activos</div>
                <div class="stat-sub">${lotes.length} total</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-dove"></i></div>
                <div class="stat-val">${totalAves.toLocaleString()}</div><div class="stat-label">Aves en producción</div>
                <div class="stat-sub">${totalMuertes} muertes acum.</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-egg"></i></div>
                <div class="stat-val">${huevosHoy.toLocaleString()}</div><div class="stat-label">Huevos hoy</div>
                <div class="stat-sub">${pctPostura}% postura</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-cash-register"></i></div>
                <div class="stat-val">${pesos(ventasMes)}</div><div class="stat-label">Ventas este mes</div>
                <div class="stat-sub">${totalHuevos30.toLocaleString()} hv. (30d)</div></div>
        </div>
        <div class="grid-2">
            <div class="card"><div class="card-title"><i class="fas fa-list"></i> Lotes activos</div>
                <div id="dashLotesList"></div></div>
            <div class="card"><div class="card-title"><i class="fas fa-chart-line"></i> Producción 7 días</div>
                <div class="chart-wrap"><canvas id="dashChart"></canvas></div></div>
        </div>
        <div class="grid-3">
            <div class="card"><div class="card-title"><i class="fas fa-egg"></i> Top producción hoy</div>
                <div id="dashTopProd"></div></div>
            <div class="card"><div class="card-title"><i class="fas fa-skull" style="color:#b03025"></i> Alertas sanitarias</div>
                <div id="dashAlertas"></div></div>
            <div class="card"><div class="card-title"><i class="fas fa-store"></i> Últimas ventas</div>
                <div id="dashVentas"></div></div>
        </div>`;

    // Lotes activos
    const listEl = gid('dashLotesList');
    if (!lotesActivos.length) {
        listEl.innerHTML = '<div class="empty-state"><i class="fas fa-layer-group"></i>Sin lotes activos</div>';
    } else {
        listEl.innerHTML = lotesActivos.map(l => {
            const prods = todasProd.filter(p => p.lote_id === l.id);
            const totalP = prods.reduce((s,p) => s+p.huevos_total, 0);
            const avg = prods.length ? (totalP/prods.length).toFixed(0) : 0;
            const dias = Math.floor((Date.now()-new Date(l.fecha_ingreso).getTime())/86400000);
            const muertes = todosSan.filter(s => s.lote_id===l.id && s.tipo==='muerte').reduce((s,e)=>s+(e.cantidad||0),0);
            const pct = l.cantidad_inicial > 0 ? Math.min(100, (muertes/l.cantidad_inicial*100)).toFixed(1) : '0.0';
            return `<div class="ev-card"><div><strong>${escHtml(l.nombre)}</strong>
                <span class="chip chip-green" style="margin-left:6px">${escHtml(l.estado)}</span></div>
                <div class="ev-meta">${l.cantidad_inicial} aves · ${dias} días · Prom ${avg} hv/día · Mort. ${pct}%</div></div>`;
        }).join('');
    }

    // Top producción hoy
    const prodHoy = todasProd.filter(p => p.fecha === hoy);
    const loteMap = Object.fromEntries(lotes.map(l => [l.id, l.nombre]));
    const topEl = gid('dashTopProd');
    if (!prodHoy.length) {
        topEl.innerHTML = '<div class="empty-state" style="padding:16px"><i class="fas fa-egg"></i>Sin producción hoy</div>';
    } else {
        const byLote = {};
        prodHoy.forEach(p => { byLote[p.lote_id] = (byLote[p.lote_id]||0) + p.huevos_total; });
        topEl.innerHTML = Object.entries(byLote).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([lid,total]) => {
            const l = lotes.find(x => x.id == lid);
            const pct = l ? ((total/l.cantidad_inicial)*100).toFixed(1) : '0';
            return `<div class="kpi-bar"><i class="fas fa-egg" style="color:#b87a3a"></i>
                <span>${escHtml(loteMap[lid]||'N/A')}: <strong>${total}</strong> hv (${pct}%)</span></div>`;
        }).join('');
    }

    // Alertas sanitarias (últimas 7 días)
    const hace7 = new Date(Date.now()-7*86400000).toISOString().slice(0,10);
    const alertas = todosSan.filter(s => s.fecha >= hace7 && ['muerte','medicamento'].includes(s.tipo));
    const alEl = gid('dashAlertas');
    if (!alertas.length) {
        alEl.innerHTML = '<div class="kpi-bar" style="background:#e5f4e8"><i class="fas fa-check-circle" style="color:#2d6e3a"></i><span>Sin alertas recientes</span></div>';
    } else {
        alEl.innerHTML = alertas.slice(0,5).map(s =>
            `<div class="ev-card ${s.tipo==='muerte'?'red':'blue'}">
            <div><strong>${escHtml(s.tipo)}</strong>${s.cantidad ? ` · ${s.cantidad}` : ''}</div>
            <div class="ev-meta">${escHtml(loteMap[s.lote_id]||'N/A')} · ${fmtDateShort(s.fecha)}</div></div>`
        ).join('');
    }

    // Últimas ventas
    const ventasEl = gid('dashVentas');
    const vRecientes = allVentas.slice(0,4);
    if (!vRecientes.length) {
        ventasEl.innerHTML = '<div class="empty-state" style="padding:16px"><i class="fas fa-store"></i>Sin ventas</div>';
    } else {
        ventasEl.innerHTML = vRecientes.map(v =>
            `<div class="ev-card ${v.estado==='pagado'?'green':v.estado==='anulado'?'red':''}">
            <div><strong>${pesos(v.total)}</strong> · <span class="chip chip-${v.estado==='pagado'?'green':v.estado==='anulado'?'red':'amber'}">${v.estado}</span></div>
            <div class="ev-meta">${escHtml(v.cliente_nombre||'Sin nombre')} · ${fmtDateShort(v.fecha)}</div></div>`
        ).join('');
    }

    // Chart — producción últimos 7 días
    requestAnimationFrame(() => {
        const canvas = gid('dashChart'); if (!canvas) return;
        destroyChart('dash');
        const fechas = lastNDays(7);
        const data = fechas.map(f => todasProd.filter(p => p.fecha===f).reduce((s,p)=>s+p.huevos_total,0));
        G.charts.dash = new Chart(canvas, {
            type: 'line',
            data: { labels: fechas.map(f => fmtDateShort(f)),
                datasets: [{ label:'Huevos diarios', data, borderColor:'#b87a3a', backgroundColor:'rgba(184,122,58,.1)', fill:true, tension:.3, pointRadius:4 }] },
            options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ y:{beginAtZero:true} } }
        });
    });
}

// ============================================================
//  LOTES — FIX: parseInt en IDs, estado en select
// ============================================================
async function renderLotes(cont) {
    cont.innerHTML = '<div class="loader">Cargando...</div>';
    const [lotes, galpones] = await Promise.all([dbAllLotes(true), dbAllGalpones()]);
    const galponesOpts = galpones.map(g => `<option value="${g.id}">${escAttr(g.nombre)}</option>`).join('');

    // Definir ANTES del innerHTML que las llama
    window.guardarLote = async (id) => {
        const nomEl = gid(`lnom_${id}`), estEl = gid(`lest_${id}`);
        if (!nomEl) return;
        const nombre = nomEl.value.trim(), estado = estEl?.value || 'activo';
        if (!nombre) { alert('El nombre no puede estar vacío'); return; }
        try { await dbUpdateLote(id, { nombre, estado }); await renderAdminTab('lotes'); }
        catch(e) { alert('Error: ' + e.message); }
    };
    window.eliminarLote = async (id) => {
        if (!confirm('¿Eliminar este lote? Se perderán TODOS los datos asociados.')) return;
        try { await dbDeleteLote(id); await renderAdminTab('lotes'); }
        catch(e) { alert('Error al eliminar: ' + e.message); }
    };

    const rows = lotes.map(l => `<tr>
        <td><input id="lnom_${l.id}" value="${escAttr(l.nombre)}" style="min-width:120px"></td>
        <td><span class="chip chip-amber">${escAttr(l.codigo)}</span></td>
        <td>${fmtDateShort(l.fecha_ingreso)}</td>
        <td>${l.cantidad_inicial}</td>
        <td>${escHtml(l.raza||'-')}</td>
        <td><select id="lest_${l.id}">
            <option value="activo"     ${l.estado==='activo'    ?'selected':''}>activo</option>
            <option value="inactivo"   ${l.estado==='inactivo'  ?'selected':''}>inactivo</option>
            <option value="vendido"    ${l.estado==='vendido'   ?'selected':''}>vendido</option>
            <option value="descartado" ${l.estado==='descartado'?'selected':''}>descartado</option>
        </select></td>
        <td style="white-space:nowrap">
            <button class="btn btn-sm btn-primary" onclick="guardarLote(${l.id})"><i class="fas fa-save"></i></button>
            <button class="btn btn-sm btn-danger"  onclick="eliminarLote(${l.id})"><i class="fas fa-trash"></i></button>
        </td>
    </tr>`).join('');

    cont.innerHTML = `
        <div class="card"><div class="card-title"><i class="fas fa-plus-circle"></i> Nuevo lote</div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Código *</label><input id="loteCodigo" placeholder="L2025-01"></div>
                <div class="fg"><label>Nombre *</label><input id="loteNombre" placeholder="Lote A"></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Fecha ingreso *</label><input type="date" id="loteFecha" value="${todayISO()}"></div>
                <div class="fg"><label>Raza</label><input id="loteRaza" value="Coturnix japonica"></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Cantidad inicial *</label><input type="number" id="loteCant" min="1" value="100"></div>
                <div class="fg"><label>Hembras</label><input type="number" id="loteHembras" min="0" value="0"></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Machos</label><input type="number" id="loteMachos" min="0" value="0"></div>
                <div class="fg"><label>Galpón</label><select id="loteGalpon"><option value="">Sin galpón</option>${galponesOpts}</select></div>
            </div>
            <div class="fg mb-16"><label>Procedencia</label><input id="loteProcedencia" placeholder="Incubadora propia, comprado..."></div>
            <button class="btn btn-primary" id="btnCrearLote"><i class="fas fa-plus"></i> Crear lote</button>
            <div id="loteMsg"></div>
        </div>
        <div class="card"><div class="card-title"><i class="fas fa-list"></i> Lotes registrados <small>${lotes.length} total</small></div>
            <div class="data-table-wrap"><table class="data-table">
                <thead><tr><th>Nombre</th><th>Código</th><th>Ingreso</th><th>Aves</th><th>Raza</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody>${rows || '<tr><td colspan="7" style="text-align:center;padding:24px;color:#7a5f44">No hay lotes registrados</td></tr>'}</tbody>
            </table></div>
        </div>`;

    gid('btnCrearLote').onclick = async () => {
        const codigo = gid('loteCodigo').value.trim(), nombre = gid('loteNombre').value.trim();
        const fecha  = gid('loteFecha').value, raza = gid('loteRaza').value.trim();
        const cantidad = parseInt(gid('loteCant').value), hembras = parseInt(gid('loteHembras').value)||0;
        const machos = parseInt(gid('loteMachos').value)||0;
        const galpon_id = gid('loteGalpon').value || null;
        const procedencia = gid('loteProcedencia').value.trim();
        if (!codigo || !nombre || !fecha || !cantidad || cantidad < 1) {
            showMsg('loteMsg','Código, nombre, fecha y cantidad son obligatorios','error'); return;
        }
        try {
            await dbCreateLote({ codigo, nombre, fecha_ingreso:fecha, raza, cantidad_inicial:cantidad,
                hembras, machos, galpon_id: galpon_id ? Number(galpon_id) : null,
                procedencia, estado:'activo', created_by: G.userId });
            showMsg('loteMsg','Lote creado correctamente','success');
            await renderAdminTab('lotes');
        } catch(e) { showMsg('loteMsg', e.message.includes('unique') ? `El código "${codigo}" ya existe` : e.message,'error'); }
    };
}

//  PRODUCCIÓN — FIX: single request, colores fijos
// ============================================================
async function renderProduccion(cont) {
    cont.innerHTML = '<div class="loader">Cargando...</div>';
    const lotes = await dbAllLotes();
    const lotesActivos = lotes.filter(l => l.estado==='activo');
    if (!lotesActivos.length) { cont.innerHTML = '<div class="card"><div class="empty-state"><i class="fas fa-layer-group"></i>No hay lotes activos.</div></div>'; return; }

    const ids = lotesActivos.map(l => l.id);
    const allProds = await dbProduccionesAllLotes(ids);
    allProds.sort((a,b) => new Date(b.fecha)-new Date(a.fecha));
    const loteMap = Object.fromEntries(lotes.map(l => [l.id, l]));
    const opts = lotesActivos.map(l => `<option value="${l.id}">${escAttr(l.nombre)} (${escAttr(l.codigo)})</option>`).join('');
    const hoy = todayISO();

    cont.innerHTML = `
        <div class="card"><div class="card-title"><i class="fas fa-plus-circle"></i> Registrar producción diaria</div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Lote</label><select id="prodLote">${opts}</select></div>
                <div class="fg"><label>Fecha</label><input type="date" id="prodFecha" value="${hoy}"></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Huevos totales</label><input type="number" id="prodCant" min="0" value="0"></div>
                <div class="fg"><label>Huevos fértiles</label><input type="number" id="prodFertiles" min="0" value="0"></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Huevos comerciales</label><input type="number" id="prodComerciales" min="0" value="0"></div>
                <div class="fg"><label>Huevos descarte/rotos</label><input type="number" id="prodDescarte" min="0" value="0"></div>
            </div>
            <div class="fg mb-16"><label>Clasificación</label><select id="prodClasif">
                <option value="grandes">Grandes</option><option value="medianos">Medianos</option>
                <option value="pequeños">Pequeños</option><option value="mixto" selected>Mixto</option>
                <option value="sucios">Sucios</option><option value="rotos">Rotos</option>
            </select></div>
            <div class="fg mb-16"><label>Observaciones</label><textarea id="prodObs" rows="1" placeholder="Observaciones opcionales..."></textarea></div>
            <button class="btn btn-primary" id="btnRegProd"><i class="fas fa-save"></i> Registrar</button>
            <div id="prodMsg"></div>
        </div>
        <div class="grid-2">
            <div class="card"><div class="card-title"><i class="fas fa-list"></i> Últimas producciones <small>últimos 30 reg.</small></div><div id="prodList"></div></div>
            <div class="card"><div class="card-title"><i class="fas fa-percent"></i> % Postura hoy</div><div id="prodResumen"></div></div>
        </div>
        <div class="card"><div class="card-title"><i class="fas fa-chart-line"></i> Producción por lote — últimos 15 días</div>
            <div class="chart-wrap"><canvas id="prodChart"></canvas></div></div>`;

    gid('btnRegProd').onclick = async () => {
        const lote_id = gid('prodLote').value, fecha = gid('prodFecha').value;
        const cant = parseInt(gid('prodCant').value)||0;
        const fertiles = parseInt(gid('prodFertiles').value)||0;
        const comerciales = parseInt(gid('prodComerciales').value)||0;
        const descarte = parseInt(gid('prodDescarte').value)||0;
        const clasificacion = gid('prodClasif').value;
        const obs = gid('prodObs').value.trim();
        if (!lote_id || !fecha || cant < 0) { showMsg('prodMsg','Lote, fecha y cantidad válida son obligatorios','error'); return; }
        const lote = loteMap[lote_id];
        const pct_postura = lote && lote.cantidad_inicial > 0 ? ((cant/lote.cantidad_inicial)*100).toFixed(2) : null;
        try {
            await dbCreateProduccion({ lote_id:parseInt(lote_id), fecha, huevos_total:cant,
                huevos_fertiles:fertiles, huevos_comerciales:comerciales, huevos_descarte:descarte,
                clasificacion, porcentaje_postura:pct_postura, observaciones:obs||null, registrado_por:G.userId });
            showMsg('prodMsg','Producción registrada correctamente','success');
            await renderAdminTab('produccion');
        } catch(e) { showMsg('prodMsg', e.message,'error'); }
    };

    // Lista
    const listEl = gid('prodList');
    if (!allProds.length) {
        listEl.innerHTML = '<div class="empty-state"><i class="fas fa-egg"></i>Sin registros</div>';
    } else {
        listEl.innerHTML = allProds.slice(0,30).map(p =>
            `<div class="ev-card"><div><strong>${p.huevos_total}</strong> hv
            <span class="chip chip-amber" style="margin-left:5px">${escHtml(p.clasificacion||'-')}</span>
            ${p.porcentaje_postura ? `<span style="font-size:.75rem;color:#7a5f44;margin-left:4px">${p.porcentaje_postura}%</span>` : ''}</div>
            <div class="ev-meta">${escHtml(loteMap[p.lote_id]?.nombre||'N/A')} · ${fmtDateShort(p.fecha)}</div></div>`
        ).join('');
    }

    // Resumen hoy
    const resEl = gid('prodResumen');
    let resHtml = '';
    lotesActivos.forEach(l => {
        const p = allProds.filter(pp => pp.lote_id===l.id && pp.fecha===hoy);
        const total = p.reduce((s,pp)=>s+pp.huevos_total,0);
        const pct = l.cantidad_inicial > 0 ? ((total/l.cantidad_inicial)*100).toFixed(1) : '0.0';
        const color = parseFloat(pct) < 50 ? '#b03025' : parseFloat(pct) < 70 ? '#c07820' : '#2d6e3a';
        resHtml += `<div class="kpi-bar"><i class="fas fa-egg" style="color:#b87a3a"></i>
            <div style="flex:1"><span>${escHtml(l.nombre)}: <strong>${total}</strong> hv</span>
            <div class="progress-bar" style="margin-top:4px">
                <div class="progress-fill" style="width:${Math.min(100,pct)}%;background:${color}"></div>
            </div><span style="font-size:.72rem;color:${color}">${pct}% postura</span></div></div>`;
    });
    resEl.innerHTML = resHtml || '<div class="empty-state" style="padding:16px">Sin producción hoy</div>';

    // Chart — FIX: colores fijos
    requestAnimationFrame(() => {
        const canvas = gid('prodChart'); if (!canvas) return;
        destroyChart('prod');
        const fechas = lastNDays(15);
        const datasets = lotesActivos.map((l,idx) => ({
            label: l.nombre,
            data: fechas.map(f => allProds.filter(p=>p.lote_id===l.id&&p.fecha===f).reduce((s,p)=>s+p.huevos_total,0)),
            fill: false, borderColor: CHART_COLORS[idx%CHART_COLORS.length], tension:.3, pointRadius:3
        }));
        G.charts.prod = new Chart(canvas, {
            type:'line', data:{ labels:fechas.map(f=>fmtDateShort(f)), datasets },
            options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'top'} }, scales:{ y:{beginAtZero:true} } }
        });
    });
}

//  INCUBACIÓN — MÓDULO NUEVO COMPLETO
// ============================================================
async function renderIncubacion(cont) {
    cont.innerHTML = '<div class="loader">Cargando...</div>';
    const [lotes, allInc] = await Promise.all([dbAllLotes(), dbAllIncubacion()]);
    const lotesActivos = lotes.filter(l => l.estado==='activo');
    const opts = lotesActivos.map(l => `<option value="${l.id}">${escAttr(l.nombre)} (${escAttr(l.codigo)})</option>`).join('');

    window.actualizarIncubacion = async (id) => {
        const nacEl = gid(`inc_nac_${id}`), salEl = gid(`inc_sal_${id}`), fertEl = gid(`inc_fert_${id}`);
        const estEl = gid(`inc_est_${id}`);
        const datos = {
            nacidos:    parseInt(nacEl?.value)||0,
            huevos_fertiles: parseInt(fertEl?.value)||0,
            fecha_salida: salEl?.value || null,
            estado: estEl?.value || 'en_proceso'
        };
        try { await dbUpdateIncubacion(id, datos); await renderAdminTab('incubacion'); }
        catch(e) { alert('Error: ' + e.message); }
    };

    const enProceso = allInc.filter(i => i.estado==='en_proceso');
    const completadas = allInc.filter(i => i.estado!=='en_proceso');

    cont.innerHTML = `
        <div class="card"><div class="card-title"><i class="fas fa-plus-circle"></i> Nuevo ciclo de incubación</div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Lote origen</label><select id="incLote">${opts}</select></div>
                <div class="fg"><label>Fecha ingreso a incubadora</label><input type="date" id="incFecha" value="${todayISO()}"></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Huevos ingresados *</label><input type="number" id="incHuevos" min="1" value="100"></div>
                <div class="fg"><label>Temperatura (°C)</label><input type="number" id="incTemp" step="0.1" min="35" max="42" value="37.5"></div>
            </div>
            <div class="fg mb-16"><label>Humedad (%)</label><input type="number" id="incHumedad" min="40" max="90" value="65"></div>
            <div class="fg mb-16"><label>Observaciones</label><textarea id="incObs" rows="1" placeholder="Proveedor de huevos, características..."></textarea></div>
            <button class="btn btn-primary" id="btnRegInc"><i class="fas fa-plus"></i> Registrar ciclo</button>
            <div id="incMsg"></div>
        </div>

        <div class="grid-3 mb-16">
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-fire-flame-curved"></i></div>
                <div class="stat-val">${enProceso.length}</div><div class="stat-label">En incubación</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-baby-carriage"></i></div>
                <div class="stat-val">${completadas.reduce((s,i)=>s+(i.nacidos||0),0)}</div>
                <div class="stat-label">Nacidos total</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-percent"></i></div>
                <div class="stat-val">${(() => {
                    const h = completadas.reduce((s,i)=>s+i.huevos_ingresados,0);
                    const n = completadas.reduce((s,i)=>s+(i.nacidos||0),0);
                    return h > 0 ? ((n/h)*100).toFixed(1) : '0';
                })()}%</div>
                <div class="stat-label">Natalidad promedio</div></div>
        </div>

        <div class="card"><div class="card-title"><i class="fas fa-fire-flame-curved"></i> En proceso (${enProceso.length})</div>
            <div id="incEnProceso"></div></div>
        <div class="card"><div class="card-title"><i class="fas fa-check-circle"></i> Historial de incubaciones</div>
            <div id="incHistorial"></div></div>`;

    gid('btnRegInc').onclick = async () => {
        const lote_id = gid('incLote').value, fecha = gid('incFecha').value;
        const huevos = parseInt(gid('incHuevos').value)||0;
        const temp = parseFloat(gid('incTemp').value)||null;
        const humedad = parseFloat(gid('incHumedad').value)||null;
        const obs = gid('incObs').value.trim();
        if (!lote_id || !fecha || huevos < 1) { showMsg('incMsg','Lote, fecha y huevos son obligatorios','error'); return; }
        try {
            await dbCreateIncubacion({ lote_id:parseInt(lote_id), fecha_ingreso:fecha, huevos_ingresados:huevos,
                temperatura_c:temp, humedad_pct:humedad, estado:'en_proceso', observaciones:obs||null });
            showMsg('incMsg','Ciclo de incubación registrado','success');
            await renderAdminTab('incubacion');
        } catch(e) { showMsg('incMsg', e.message,'error'); }
    };

    const loteMap = Object.fromEntries(lotes.map(l=>[l.id, l.nombre]));
    const prEl = gid('incEnProceso');
    if (!enProceso.length) {
        prEl.innerHTML = '<div class="empty-state" style="padding:16px"><i class="fas fa-fire-flame-curved"></i>No hay lotes en incubación</div>';
    } else {
        prEl.innerHTML = enProceso.map(i => {
            const dias = Math.floor((Date.now()-new Date(i.fecha_ingreso).getTime())/86400000);
            return `<div class="ev-card purple">
                <div><strong>${escHtml(loteMap[i.lote_id]||'N/A')}</strong> · ${i.huevos_ingresados} huevos
                    <span class="chip chip-amber" style="margin-left:6px">${dias} días</span></div>
                <div class="ev-meta">Temp: ${i.temperatura_c||'N/A'}°C · Hum: ${i.humedad_pct||'N/A'}%</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center">
                    <div class="fg" style="flex:1;min-width:100px"><label style="font-size:.68rem">Huevos fértiles</label>
                        <input type="number" id="inc_fert_${i.id}" min="0" max="${i.huevos_ingresados}" value="${i.huevos_fertiles||0}" style="padding:4px 8px;border:1px solid #dccfc0;border-radius:8px;width:100%"></div>
                    <div class="fg" style="flex:1;min-width:100px"><label style="font-size:.68rem">Nacidos</label>
                        <input type="number" id="inc_nac_${i.id}" min="0" value="${i.nacidos||0}" style="padding:4px 8px;border:1px solid #dccfc0;border-radius:8px;width:100%"></div>
                    <div class="fg" style="flex:1;min-width:110px"><label style="font-size:.68rem">Fecha salida</label>
                        <input type="date" id="inc_sal_${i.id}" value="${i.fecha_salida||''}" style="padding:4px 8px;border:1px solid #dccfc0;border-radius:8px;width:100%"></div>
                    <div class="fg" style="min-width:110px"><label style="font-size:.68rem">Estado</label>
                        <select id="inc_est_${i.id}" style="padding:4px 8px;border:1px solid #dccfc0;border-radius:8px">
                            <option value="en_proceso" ${i.estado==='en_proceso'?'selected':''}>En proceso</option>
                            <option value="eclosionado" ${i.estado==='eclosionado'?'selected':''}>Eclosionado</option>
                            <option value="cancelado" ${i.estado==='cancelado'?'selected':''}>Cancelado</option>
                        </select></div>
                    <button class="btn btn-sm btn-success" onclick="actualizarIncubacion(${i.id})" style="align-self:flex-end">
                        <i class="fas fa-save"></i> Guardar</button>
                </div>
            </div>`;
        }).join('');
    }

    const histEl = gid('incHistorial');
    if (!completadas.length) {
        histEl.innerHTML = '<div class="empty-state" style="padding:16px"><i class="fas fa-history"></i>Sin historial</div>';
    } else {
        histEl.innerHTML = completadas.map(i => {
            const natalidad = i.huevos_ingresados > 0 ? ((i.nacidos||0)/i.huevos_ingresados*100).toFixed(1) : '0';
            return `<div class="ev-card ${i.estado==='eclosionado'?'green':'red'}">
                <div><strong>${escHtml(loteMap[i.lote_id]||'N/A')}</strong> · ${i.huevos_ingresados} ingresados
                    <span class="chip chip-${i.estado==='eclosionado'?'green':'red'}" style="margin-left:6px">${i.estado}</span></div>
                <div class="ev-meta">Nacidos: ${i.nacidos||0} (${natalidad}% natalidad) · ${fmtDateShort(i.fecha_ingreso)}</div>
            </div>`;
        }).join('');
    }
}

//  ALIMENTACIÓN — FIX: no async en rAF, datos precargados
// ============================================================
async function renderAlimentacion(cont) {
    cont.innerHTML = '<div class="loader">Cargando...</div>';
    const lotes = await dbAllLotes();
    const lotesActivos = lotes.filter(l => l.estado==='activo');
    if (!lotesActivos.length) { cont.innerHTML = '<div class="card"><div class="empty-state"><i class="fas fa-wheat-awn"></i>No hay lotes activos.</div></div>'; return; }

    const ids = lotesActivos.map(l => l.id);
    // FIX: ambos requests en paralelo, no secuencial
    const [allConsumos, allProds] = await Promise.all([
        dbConsumoAllLotes(ids),
        dbProduccionesAllLotes(ids)
    ]);
    allConsumos.sort((a,b) => new Date(b.fecha)-new Date(a.fecha));

    const loteMap = Object.fromEntries(lotes.map(l => [l.id, l]));
    const opts = lotesActivos.map(l => `<option value="${l.id}">${escAttr(l.nombre)} (${escAttr(l.codigo)})</option>`).join('');

    cont.innerHTML = `
        <div class="card"><div class="card-title"><i class="fas fa-plus-circle"></i> Registrar consumo de alimento</div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Lote</label><select id="aliLote">${opts}</select></div>
                <div class="fg"><label>Fecha</label><input type="date" id="aliFecha" value="${todayISO()}"></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Cantidad (kg)</label><input type="number" id="aliCant" step="0.001" min="0.001" value="1"></div>
                <div class="fg"><label>Tipo de alimento</label><input id="aliTipo" placeholder="Postura, Levante, Iniciación..."></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Costo por kg ($)</label><input type="number" id="aliCostoKg" step="10" min="0" value="0"></div>
                <div class="fg"><label>Proveedor</label><input id="aliProveedor" placeholder="Proveedor de alimento"></div>
            </div>
            <button class="btn btn-primary" id="btnRegAli"><i class="fas fa-save"></i> Registrar consumo</button>
            <div id="aliMsg"></div>
        </div>
        <div class="grid-2">
            <div class="card"><div class="card-title"><i class="fas fa-list"></i> Últimos consumos</div><div id="aliList"></div></div>
            <div class="card"><div class="card-title"><i class="fas fa-balance-scale"></i> Conversión alimenticia (kg/docena)</div><div id="aliConversion"></div></div>
        </div>
        <div class="card"><div class="card-title"><i class="fas fa-chart-bar"></i> Consumo diario por lote</div>
            <div class="chart-wrap"><canvas id="aliChart"></canvas></div></div>`;

    gid('btnRegAli').onclick = async () => {
        const lote_id = gid('aliLote').value, fecha = gid('aliFecha').value;
        const cantidad_kg = parseFloat(gid('aliCant').value);
        const tipo_alimento = gid('aliTipo').value.trim();
        const costo_kg = parseFloat(gid('aliCostoKg').value)||0;
        const proveedor = gid('aliProveedor').value.trim()||null;
        if (!lote_id||!fecha||isNaN(cantidad_kg)||cantidad_kg<=0||!tipo_alimento) {
            showMsg('aliMsg','Todos los campos son obligatorios y cantidad > 0','error'); return;
        }
        try {
            await dbCreateConsumo({ lote_id:parseInt(lote_id), fecha, cantidad_kg, tipo_alimento, costo_kg, proveedor });
            showMsg('aliMsg','Consumo registrado correctamente','success');
            await renderAdminTab('alimentacion');
        } catch(e) { showMsg('aliMsg', e.message,'error'); }
    };

    const listEl = gid('aliList');
    if (!allConsumos.length) {
        listEl.innerHTML = '<div class="empty-state"><i class="fas fa-wheat-awn"></i>Sin consumos</div>';
    } else {
        listEl.innerHTML = allConsumos.slice(0,20).map(c =>
            `<div class="ev-card blue"><div><strong>${Number(c.cantidad_kg).toFixed(2)} kg</strong> · ${escHtml(c.tipo_alimento)}
            ${c.costo_kg > 0 ? `<span style="font-size:.75rem;color:#7a5f44"> · ${pesos(c.costo_kg)}/kg</span>` : ''}</div>
            <div class="ev-meta">${escHtml(loteMap[c.lote_id]?.nombre||'N/A')} · ${fmtDateShort(c.fecha)}</div></div>`
        ).join('');
    }

    // Conversión alimenticia — datos ya cargados, sin await
    const convEl = gid('aliConversion');
    convEl.innerHTML = lotesActivos.map(l => {
        const cons = allConsumos.filter(c => c.lote_id===l.id);
        const totalKg = cons.reduce((s,c)=>s+c.cantidad_kg,0);
        const totalCosto = cons.reduce((s,c)=>s+(c.costo_kg||0)*c.cantidad_kg,0);
        const totalHv = allProds.filter(p=>p.lote_id===l.id).reduce((s,p)=>s+p.huevos_total,0);
        const docenas = totalHv/12;
        const conv = docenas > 0 ? (totalKg/docenas).toFixed(3) : 'N/A';
        const cphv = totalHv > 0 ? pesos((totalCosto/totalHv).toFixed(2)) : 'N/A';
        return `<div class="kpi-bar"><i class="fas fa-balance-scale" style="color:#226688"></i>
            <div><div><strong>${escHtml(l.nombre)}</strong>: ${conv} kg/docena</div>
            <div style="font-size:.78rem;color:#7a5f44">${Number(totalKg).toFixed(1)} kg consumidos · Costo/huevo: ${cphv}</div></div></div>`;
    }).join('') || '<div class="empty-state" style="padding:16px">Sin datos</div>';

    // FIX: chart sin await, datos ya disponibles en allConsumos
    requestAnimationFrame(() => {
        const canvas = gid('aliChart'); if (!canvas) return;
        destroyChart('ali');
        const fechas = lastNDays(15);
        const datasets = lotesActivos.map((l,idx) => ({
            label: l.nombre,
            data: fechas.map(f => allConsumos.filter(c=>c.lote_id===l.id&&c.fecha===f).reduce((s,c)=>s+c.cantidad_kg,0)),
            backgroundColor: CHART_COLORS[idx%CHART_COLORS.length]+'bb',
            borderColor: CHART_COLORS[idx%CHART_COLORS.length], borderWidth: 1
        }));
        G.charts.ali = new Chart(canvas, {
            type:'bar', data:{ labels:fechas.map(f=>fmtDateShort(f)), datasets },
            options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'top'} },
                scales:{ y:{ beginAtZero:true, ticks:{ callback: v => v+' kg' } } } }
        });
    });
}

            <div class="card"><div class="card-title"><i class="fas fa-skull" style="color:#b03025"></i> Mortalidad acumulada</div><div id="sanMortalidad"></div></div>
        </div>`;

    gid('btnRegSan').onclick = async () => {
        const lote_id=gid('sanLote').value, fecha=gid('sanFecha').value, tipo=gid('sanTipo').value;
        const cantidad=parseInt(gid('sanCant').value)||0;
        const producto=gid('sanProducto').value.trim()||null;
        const dosis=gid('sanDosis').value.trim()||null;
        const costo=parseFloat(gid('sanCosto').value)||0;
        const veterinario=gid('sanVet').value.trim()||null;
        const descripcion=gid('sanDesc').value.trim();
        if (!lote_id||!fecha||!tipo) { showMsg('sanMsg','Lote, fecha y tipo son obligatorios','error'); return; }
        try {
            await dbCreateSanitario({ lote_id:parseInt(lote_id), fecha, tipo, cantidad, producto, dosis,
                costo, veterinario, descripcion:descripcion||null });
            showMsg('sanMsg','Evento registrado correctamente','success');
            await renderAdminTab('sanidad');
        } catch(e) { showMsg('sanMsg', e.message,'error'); }
    };

    const listEl = gid('sanList');
    if (!allSan.length) {
        listEl.innerHTML = '<div class="empty-state"><i class="fas fa-stethoscope"></i>Sin eventos</div>';
    } else {
        listEl.innerHTML = allSan.slice(0,20).map(s =>
            `<div class="ev-card ${colorMap[s.tipo]||''}">
            <div><strong>${escHtml(s.tipo)}</strong>${s.cantidad ? ` · ${s.cantidad} aves` : ''}
            ${s.producto ? `<span style="font-size:.78rem;color:#7a5f44"> · ${escHtml(s.producto)}</span>` : ''}
            ${s.costo > 0 ? `<span style="font-size:.75rem;color:#b87a3a"> · ${pesos(s.costo)}</span>` : ''}</div>
            ${s.descripcion ? `<div class="ev-meta">${escHtml(s.descripcion)}</div>` : ''}
            <div class="ev-meta">${escHtml(loteMap[s.lote_id]?.nombre||'N/A')} · ${fmtDateShort(s.fecha)}</div></div>`
        ).join('');
    }

    const mortEl = gid('sanMortalidad');
    mortEl.innerHTML = lotesActivos.map(l => {
        const muertes  = allSan.filter(s=>s.lote_id===l.id&&s.tipo==='muerte').reduce((s,e)=>s+(e.cantidad||0),0);
        const descartes= allSan.filter(s=>s.lote_id===l.id&&s.tipo==='descarte').reduce((s,e)=>s+(e.cantidad||0),0);
        const pct = l.cantidad_inicial > 0 ? ((muertes/l.cantidad_inicial)*100).toFixed(2) : '0.00';
        const avesVivas = l.cantidad_inicial - muertes - descartes;
        const color = parseFloat(pct) > 5 ? '#b03025' : parseFloat(pct) > 2 ? '#c07820' : '#2d6e3a';
        return `<div class="kpi-bar"><i class="fas fa-dove"></i>
            <div><div><strong>${escHtml(l.nombre)}</strong>: <span style="color:${color}">${muertes} muertes (${pct}%)</span></div>
            <div style="font-size:.78rem;color:#7a5f44">${descartes} descartes · Aves vivas: ${avesVivas}</div></div></div>`;
    }).join('') || '<div class="empty-state" style="padding:16px">Sin mortalidad</div>';
}

async function renderCostos(cont) {
    cont.innerHTML = '<div class="loader">Cargando...</div>';
    const lotes = await dbAllLotes();
    const lotesActivos = lotes.filter(l => l.estado==='activo');
    if (!lotesActivos.length) { cont.innerHTML = '<div class="card"><div class="empty-state"><i class="fas fa-coins"></i>No hay lotes activos.</div></div>'; return; }

    const ids = lotesActivos.map(l => l.id);
    const [allCostos, allProds] = await Promise.all([dbCostosAllLotes(ids), dbProduccionesAllLotes(ids)]);
    allCostos.sort((a,b) => new Date(b.fecha)-new Date(a.fecha));

    const loteMap = Object.fromEntries(lotes.map(l => [l.id, l]));
    const opts = lotesActivos.map(l => `<option value="${l.id}">${escAttr(l.nombre)} (${escAttr(l.codigo)})</option>`).join('');
    const catColors = { alimento:'blue', sanidad:'green', mano_obra:'purple', infraestructura:'', servicios:'amber', general:'' };

    cont.innerHTML = `
        <div class="card"><div class="card-title"><i class="fas fa-plus-circle"></i> Registrar costo</div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Lote</label><select id="cosLote">${opts}</select></div>
                <div class="fg"><label>Fecha</label><input type="date" id="cosFecha" value="${todayISO()}"></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Categoría</label><select id="cosCategoria">
                    <option value="alimento">Alimento</option><option value="sanidad">Sanidad</option>
                    <option value="mano_obra">Mano de obra</option><option value="infraestructura">Infraestructura</option>
                    <option value="servicios">Servicios (agua, luz...)</option><option value="general">General</option>
                </select></div>
                <div class="fg"><label>Concepto *</label><input id="cosConcepto" placeholder="Descripción del costo"></div>
            </div>
            <div class="fg mb-16"><label>Monto ($) *</label><input type="number" id="cosMonto" step="100" min="1" value="0"></div>
            <button class="btn btn-primary" id="btnRegCosto"><i class="fas fa-save"></i> Registrar costo</button>
            <div id="cosMsg"></div>
        </div>
        <div class="grid-2">
            <div class="card"><div class="card-title"><i class="fas fa-list"></i> Últimos costos</div><div id="cosList"></div></div>
            <div class="card"><div class="card-title"><i class="fas fa-calculator"></i> Análisis de rentabilidad</div><div id="costoHuevoList"></div></div>
        </div>`;

    gid('btnRegCosto').onclick = async () => {
        const lote_id=gid('cosLote').value, fecha=gid('cosFecha').value;
        const concepto=gid('cosConcepto').value.trim();
        const monto=parseFloat(gid('cosMonto').value);
        const categoria=gid('cosCategoria').value;
        if (!lote_id||!fecha||!concepto||isNaN(monto)||monto<=0) {
            showMsg('cosMsg','Todos los campos son obligatorios y monto > 0','error'); return;
        }
        try {
            await dbCreateCosto({ lote_id:parseInt(lote_id), fecha, categoria, concepto, monto });
            showMsg('cosMsg','Costo registrado correctamente','success');
            await renderAdminTab('costos');
        } catch(e) { showMsg('cosMsg', e.message,'error'); }
    };

    const listEl = gid('cosList');
    if (!allCostos.length) {
        listEl.innerHTML = '<div class="empty-state"><i class="fas fa-coins"></i>Sin costos</div>';
    } else {
        listEl.innerHTML = allCostos.slice(0,20).map(c =>
            `<div class="ev-card"><div>
            <span class="chip chip-${catColors[c.categoria]||'gray'}" style="margin-right:6px">${escHtml(c.categoria)}</span>
            <strong>${escHtml(c.concepto)}</strong> · <span style="color:#b87a3a;font-weight:600">${pesos(c.monto)}</span></div>
            <div class="ev-meta">${escHtml(loteMap[c.lote_id]?.nombre||'N/A')} · ${fmtDateShort(c.fecha)}</div></div>`
        ).join('');
    }

    const chEl = gid('costoHuevoList');
    let chHtml = `<div class="data-table-wrap"><table class="data-table">
        <thead><tr><th>Lote</th><th>Total costos</th><th>Huevos</th><th>$/huevo</th><th>$/docena</th></tr></thead><tbody>`;
    lotesActivos.forEach(l => {
        const costos = allCostos.filter(c => c.lote_id===l.id);
        const totalC = costos.reduce((s,c)=>s+c.monto,0);
        const totalH = allProds.filter(p=>p.lote_id===l.id).reduce((s,p)=>s+p.huevos_total,0);
        const ch = totalH > 0 ? (totalC/totalH).toFixed(2) : 'N/A';
        const cd = totalH > 0 ? ((totalC/totalH)*12).toFixed(0) : 'N/A';
        chHtml += `<tr><td>${escHtml(l.nombre)}</td><td>${pesos(totalC)}</td><td>${totalH.toLocaleString()}</td>
            <td>${ch!=='N/A'?pesos(ch):ch}</td><td>${cd!=='N/A'?pesos(cd):cd}</td></tr>`;
    });
    chEl.innerHTML = chHtml + '</tbody></table></div>';
}

    window.marcarPagada = async (id) => {
        try { await dbUpdateVenta(id, { estado:'pagado' }); await renderAdminTab('ventas'); }
        catch(e) { alert('Error: ' + e.message); }
    };
    window.anularVenta = async (id) => {
        if (!confirm('¿Anular esta venta?')) return;
        try { await dbUpdateVenta(id, { estado:'anulado' }); await renderAdminTab('ventas'); }
        catch(e) { alert('Error: ' + e.message); }
    };

    const opts = lotes.filter(l=>l.estado==='activo').map(l => `<option value="${l.id}">${escAttr(l.nombre)}</option>`).join('');

        .reduce((s,v)=>s+v.total,0);

                <div class="stat-val">${pesos(totalGeneral)}</div><div class="stat-label">Total histórico</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-file-invoice"></i></div>
                <div class="stat-val">${allVentas.length}</div><div class="stat-label">Transacciones</div></div>

                <div class="fg"><label>Fecha *</label><input type="date" id="vFecha" value="${todayISO()}"></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Lote (origen)</label><select id="vLote"><option value="">Sin lote</option>${opts}</select></div>
                <div class="fg"><label>Tipo de producto</label><select id="vTipo">
                    <option value="huevo_comercial">Huevo comercial</option>

                    <option value="cubeta">Cubeta (30 hv)</option><option value="bandeja">Bandeja (20 hv)</option>
                    <option value="docena">Docena</option><option value="unidad">Unidad</option>
                    <option value="kg">Kilogramo</option><option value="bulto">Bulto</option>
                </select></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Precio unitario ($) *</label><input type="number" id="vPrecio" step="50" min="1" value="4900"></div>
                <div class="fg"><label>Forma de pago</label><select id="vPago">
                    <option value="efectivo">Efectivo</option><option value="nequi">Nequi</option>
                    <option value="transferencia">Transferencia</option><option value="credito">Crédito</option>
                </select></div>
            </div>
            <div class="grid-2 mb-16">
                <div class="fg"><label>Cliente / Nombre *</label><input id="vCliente" placeholder="Nombre del cliente"></div>
                <div class="fg"><label>Teléfono cliente</label><input id="vClienteTel" placeholder="300 000 0000"></div>

            <div id="vTotalPreview" style="background:#f8f3ec;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-weight:600;color:#b87a3a">Total: $0</div>

            <div class="data-table-wrap"><table class="data-table">
                <thead><tr><th>Número</th><th>Fecha</th><th>Producto</th><th>Cant.</th><th>Precio</th><th>Total</th><th>Cliente</th><th>Pago</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody id="ventasBody"></tbody>
            </table></div>
        </div>`;

    const calcTotal = () => {
        const c = parseFloat(gid('vCantidad').value)||0;
        const p = parseFloat(gid('vPrecio').value)||0;
        gid('vTotalPreview').textContent = 'Total: ' + pesos(c*p);
    };
    gid('vCantidad').addEventListener('input', calcTotal);
    gid('vPrecio').addEventListener('input', calcTotal);

    gid('btnRegVenta').onclick = async () => {
        const numero=gid('vNumero').value.trim(), fecha=gid('vFecha').value;
        const lote_id=gid('vLote').value||null;
        const tipo=gid('vTipo').value, cantidad=parseFloat(gid('vCantidad').value);
        const unidad=gid('vUnidad').value, precio=parseFloat(gid('vPrecio').value);
        const pago=gid('vPago').value, cliente=gid('vCliente').value.trim();
        const tel=gid('vClienteTel').value.trim()||null;
        if (!numero||!fecha||!cantidad||!precio||!cliente) {
            showMsg('vMsg','Número, fecha, cantidad, precio y cliente son obligatorios','error'); return;
        }
        try {
            await dbCreateVenta({ numero_venta:numero, lote_id:lote_id?parseInt(lote_id):null, fecha,
                tipo_producto:tipo, cantidad, unidad, precio_unitario:precio, forma_pago:pago,
                cliente_nombre:cliente, cliente_tel:tel, estado:'pendiente' });

            await renderAdminTab('ventas');
        } catch(e) { showMsg('vMsg', e.message.includes('unique')?'Ese número de venta ya existe':e.message,'error'); }
    };

    const tbody = gid('ventasBody');
    if (!allVentas.length) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:24px;color:#7a5f44">Sin ventas registradas</td></tr>';
    } else {
        tbody.innerHTML = allVentas.map(v =>
            `<tr>
            <td><span style="font-family:monospace;font-size:.82rem">${escHtml(v.numero_venta)}</span></td>
            <td>${fmtDateShort(v.fecha)}</td>
            <td>${escHtml(v.tipo_producto)}</td>
            <td>${v.cantidad} ${escHtml(v.unidad)}</td>
            <td>${pesos(v.precio_unitario)}</td>
            <td><strong>${pesos(v.total)}</strong></td>
            <td>${escHtml(v.cliente_nombre||'-')}</td>
            <td>${escHtml(v.forma_pago)}</td>
            <td><span class="chip chip-${v.estado==='pagado'?'green':v.estado==='anulado'?'red':'amber'}">${v.estado}</span></td>
            <td style="white-space:nowrap">
                ${v.estado==='pendiente' ? `<button class="btn btn-xs btn-success" onclick="marcarPagada(${v.id})"><i class="fas fa-check"></i></button>` : ''}
                ${v.estado!=='anulado' ? `<button class="btn btn-xs btn-danger" onclick="anularVenta(${v.id})"><i class="fas fa-times"></i></button>` : ''}
            </td></tr>`
        ).join('');
    }
}

            await dbUpdateInventarioAlimento(tipo, stock, costo, proveedor);

            <div class="ev-meta">${escHtml(m.motivo||'Sin motivo')} · ${fmtDate(m.fecha)}</div></div>`
        ).join('');
    }
}

            <div class="grid-3" id="galponesList"></div>
        </div>`;

    const galEl = gid('galponesList');
    if (!galpones.length) {
        galEl.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-warehouse"></i>Sin galpones registrados</div>';
    } else {
        galEl.innerHTML = galpones.map(g =>
            `<div class="stat-card"><div class="stat-icon"><i class="fas fa-warehouse"></i></div>
            <div class="stat-val">${g.capacidad}</div>
            <div class="stat-label"><strong>${escHtml(g.nombre)}</strong></div>
            <div class="stat-sub">${escHtml(g.codigo)} · ${g.activo ? '✅ Activo' : '❌ Inactivo'}</div>
            ${g.descripcion ? `<div class="stat-sub" style="margin-top:4px">${escHtml(g.descripcion)}</div>` : ''}</div>`
        ).join('');
    }

    gid('btnCrearGalpon').onclick = async () => {
        const codigo=gid('galCodigo').value.trim(), nombre=gid('galNombre').value.trim();
        const capacidad=parseInt(gid('galCapacidad').value)||0;
        const descripcion=gid('galDesc').value.trim()||null;
        if (!codigo||!nombre||capacidad<1) { showMsg('galMsg','Código, nombre y capacidad son obligatorios','error'); return; }
        try {
            await dbCreateGalpon({ codigo, nombre, capacidad, descripcion, activo:true });
            showMsg('galMsg','Galpón creado correctamente','success');
            await renderAdminTab('galpones');
        } catch(e) { showMsg('galMsg', e.message.includes('unique')?`El código "${codigo}" ya existe`:e.message,'error'); }
    };
}

// ============================================================
//  REPORTES — FIX: queries paralelas, sin N+1
// ============================================================
async function renderReportes(cont) {
    cont.innerHTML = `
        <div class="card"><div class="card-title"><i class="fas fa-download"></i> Exportar datos</div>
            <div style="display:flex;flex-wrap:wrap;gap:9px;margin-bottom:12px">
                <button class="btn btn-primary btn-sm" id="expLotes"><i class="fas fa-layer-group"></i> Lotes</button>
                <button class="btn btn-primary btn-sm" id="expProduccion"><i class="fas fa-egg"></i> Producción</button>
                <button class="btn btn-primary btn-sm" id="expConsumos"><i class="fas fa-wheat-awn"></i> Consumos</button>
                <button class="btn btn-primary btn-sm" id="expSanidad"><i class="fas fa-stethoscope"></i> Sanidad</button>
                <button class="btn btn-primary btn-sm" id="expCostos"><i class="fas fa-coins"></i> Costos</button>
                <button class="btn btn-primary btn-sm" id="expVentas"><i class="fas fa-store"></i> Ventas</button>
                <button class="btn btn-primary btn-sm" id="expIncubacion"><i class="fas fa-baby-carriage"></i> Incubación</button>
            </div>
        </div>
        <div class="card"><div class="card-title"><i class="fas fa-chart-pie"></i> Resumen general (últimos 30 días)</div>
            <div id="resumenGeneral"><div class="loader">Calculando...</div></div></div>`;

    const csv = (rows, filename) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([rows], {type:'text/csv;charset=utf-8'}));
        a.download = filename; a.click();
    };

    gid('expLotes').onclick = async () => {
        const {data} = await _sb.from('lotes').select('*');
        if (!data?.length) { alert('Sin datos'); return; }
        let c = 'Código,Nombre,Ingreso,Raza,Cantidad,Machos,Hembras,Procedencia,Estado\n';
        data.forEach(l => c += `"${l.codigo}","${l.nombre}","${l.fecha_ingreso}","${l.raza||''}",${l.cantidad_inicial},${l.machos||0},${l.hembras||0},"${l.procedencia||''}","${l.estado}"\n`);
        csv(c, `lotes_${todayISO()}.csv`);
    };
    gid('expProduccion').onclick = async () => {
        const {data} = await _sb.from('produccion_diaria').select('*').order('fecha', {ascending:false});
        if (!data?.length) { alert('Sin datos'); return; }
        let c = 'Lote_ID,Fecha,Huevos_Total,Fertiles,Comerciales,Descarte,Clasificacion,Pct_Postura\n';
        data.forEach(p => c += `${p.lote_id},"${p.fecha}",${p.huevos_total},${p.huevos_fertiles||0},${p.huevos_comerciales||0},${p.huevos_descarte||0},"${p.clasificacion||''}",${p.porcentaje_postura||0}\n`);
        csv(c, `produccion_${todayISO()}.csv`);
    };
    gid('expConsumos').onclick = async () => {
        const {data} = await _sb.from('consumos_alimento').select('*');
        if (!data?.length) { alert('Sin datos'); return; }
        let c = 'Lote_ID,Fecha,Tipo,Cantidad_kg,Costo_kg,Proveedor\n';
        data.forEach(x => c += `${x.lote_id},"${x.fecha}","${x.tipo_alimento}",${x.cantidad_kg},${x.costo_kg||0},"${x.proveedor||''}"\n`);
        csv(c, `consumos_${todayISO()}.csv`);
    };
    gid('expSanidad').onclick = async () => {
        const {data} = await _sb.from('eventos_sanitarios').select('*');
        if (!data?.length) { alert('Sin datos'); return; }
        let c = 'Lote_ID,Fecha,Tipo,Cantidad,Producto,Dosis,Costo,Veterinario,Descripcion\n';
        data.forEach(s => c += `${s.lote_id},"${s.fecha}","${s.tipo}",${s.cantidad||0},"${s.producto||''}","${s.dosis||''}",${s.costo||0},"${s.veterinario||''}","${(s.descripcion||'').replace(/"/g,"'")}"\n`);
        csv(c, `sanidad_${todayISO()}.csv`);
    };
    gid('expCostos').onclick = async () => {
        const {data} = await _sb.from('costos_lote').select('*');
        if (!data?.length) { alert('Sin datos'); return; }
        let c = 'Lote_ID,Fecha,Categoria,Concepto,Monto\n';
        data.forEach(x => c += `${x.lote_id},"${x.fecha}","${x.categoria}","${x.concepto.replace(/"/g,"'")}",${x.monto}\n`);
        csv(c, `costos_${todayISO()}.csv`);
    };
    gid('expVentas').onclick = async () => {
        const {data} = await _sb.from('ventas').select('*');
        if (!data?.length) { alert('Sin datos'); return; }
        let c = 'Numero,Fecha,Tipo,Cantidad,Unidad,Precio_Unit,Total,Cliente,Pago,Estado\n';
        data.forEach(v => c += `"${v.numero_venta}","${v.fecha}","${v.tipo_producto}",${v.cantidad},"${v.unidad}",${v.precio_unitario},${v.total},"${v.cliente_nombre||''}","${v.forma_pago}","${v.estado}"\n`);
        csv(c, `ventas_${todayISO()}.csv`);
    };
    gid('expIncubacion').onclick = async () => {
        const {data} = await _sb.from('incubacion').select('*');
        if (!data?.length) { alert('Sin datos'); return; }
        let c = 'Lote_ID,Ingreso,Salida,Ingresados,Fertiles,Nacidos,Temp,Humedad,Estado\n';
        data.forEach(i => c += `${i.lote_id},"${i.fecha_ingreso}","${i.fecha_salida||''}",${i.huevos_ingresados},${i.huevos_fertiles||0},${i.nacidos||0},${i.temperatura_c||''},${i.humedad_pct||''},"${i.estado}"\n`);
        csv(c, `incubacion_${todayISO()}.csv`);
    };

    // FIX: queries paralelas para el resumen — evita N+1
    try {
        const [lotes, allProd, allCons, allSan, allCost, allVent] = await Promise.all([
            dbAllLotes(),
            _sb.from('produccion_diaria').select('lote_id,huevos_total,fecha').gte('fecha', new Date(Date.now()-30*86400000).toISOString().slice(0,10)),
            _sb.from('consumos_alimento').select('lote_id,cantidad_kg').gte('fecha', new Date(Date.now()-30*86400000).toISOString().slice(0,10)),
            _sb.from('eventos_sanitarios').select('lote_id,tipo,cantidad'),
            _sb.from('costos_lote').select('lote_id,monto'),
            _sb.from('ventas').select('total,estado').eq('estado','pagado').gte('fecha', new Date(Date.now()-30*86400000).toISOString().slice(0,10))
        ]);

        const prodMap  = (allProd.data||[]).reduce((m,p)=>{ m[p.lote_id]=(m[p.lote_id]||0)+p.huevos_total; return m; },{});
        const consMap  = (allCons.data||[]).reduce((m,c)=>{ m[c.lote_id]=(m[c.lote_id]||0)+c.cantidad_kg; return m; },{});
        const sanMap   = (allSan.data||[]).filter(s=>s.tipo==='muerte').reduce((m,s)=>{ m[s.lote_id]=(m[s.lote_id]||0)+(s.cantidad||0); return m; },{});
        const costMap  = (allCost.data||[]).reduce((m,c)=>{ m[c.lote_id]=(m[c.lote_id]||0)+c.monto; return m; },{});
        const totalVentas = (allVent.data||[]).reduce((s,v)=>s+v.total,0);

        let html = `<div class="kpi-bar mb-16"><i class="fas fa-cash-register" style="color:#b87a3a"></i>
            <span>Ventas pagadas (30 días): <strong>${pesos(totalVentas)}</strong></span></div>
            <div class="data-table-wrap"><table class="data-table">
            <thead><tr><th>Lote</th><th>Estado</th><th>Huevos (30d)</th><th>Cons. (kg)</th><th>Mortalidad</th><th>Costos total</th><th>$/huevo</th></tr></thead><tbody>`;

        lotes.forEach(l => {
            const h = prodMap[l.id]||0, kg = consMap[l.id]||0;
            const m = sanMap[l.id]||0, c = costMap[l.id]||0;
            const cph = h > 0 ? pesos((c/h).toFixed(2)) : 'N/A';
            html += `<tr><td><strong>${escHtml(l.nombre)}</strong></td>
                <td><span class="chip chip-${l.estado==='activo'?'green':l.estado==='inactivo'?'red':'gray'}">${l.estado}</span></td>
                <td>${h.toLocaleString()}</td><td>${kg.toFixed(1)}</td><td>${m}</td>
                <td>${pesos(c)}</td><td>${cph}</td></tr>`;
        });
        gid('resumenGeneral').innerHTML = html + '</tbody></table></div>';
    } catch(e) {
        gid('resumenGeneral').innerHTML = `<div class="alert alert-error">Error al generar resumen: ${escHtml(e.message)}</div>`;
    }
}

// ============================================================
//  MODALES — INIT
// ============================================================
function initModals() {
    gid('closeSupportBtn').onclick = () => gid('supportModal').classList.add('hidden');
    ['supportModal','forgotModal','newPasswordModal'].forEach(id => {
        const el = gid(id);
        if (el) el.addEventListener('click', e => { if (e.target===el) el.classList.add('hidden'); });
    });
}

// ============================================================
//  BOOT — PUNTO DE ENTRADA
// ============================================================
(async function boot() {
    initModals();
    handleRecoveryToken();

    gid('logoFileInput').onchange = e => {
        const file = e.target.files[0]; if (!file) return;
        if (file.size > 3*1024*1024) { alert('El logo debe pesar menos de 3 MB.'); return; }
        const reader = new FileReader();
        reader.onload = ev => {
            lsSet('granjaLogo', ev.target.result);
            setLogoEl(gid('adminTopLogo'));
            updateAuthLogo();
        };
        reader.readAsDataURL(file);
    };

    // FIX: usar sola instancia de Supabase (_sb), no window.supabase
    const { data: { session } } = await _sb.auth.getSession();

    if (!session) {
        gid('authPage').classList.remove('hidden');
        initAuthPage();
        return;
    }

    try {
        G.userId = session.user.id;
        const profile = await dbProfile(G.userId);
        G.esAdmin   = profile.es_admin   || false;
        G.nombre    = profile.nombre      || session.user.email || 'Usuario';
        G.email     = profile.email       || session.user.email || '';
        if (!G.esAdmin) {
            alert('Acceso restringido a administradores. Contacta al soporte.');
            await _sb.auth.signOut(); location.reload(); return;
        }
    } catch(e) {
        console.error('Error perfil:', e);
        await _sb.auth.signOut();
        gid('authPage').classList.remove('hidden');
        initAuthPage();
        showMsg('loginErr','Error al cargar perfil. Inicia sesión nuevamente.','warn');
        return;
    }

    gid('authPage').classList.add('hidden');
    gid('adminPage').classList.remove('hidden');
    await initAdminPage();

    // FIX: listener para sesión expirada
    _sb.auth.onAuthStateChange(event => {
        if (event === 'SIGNED_OUT') location.reload();
    });
})();
</script>
